<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CourseForge - Adaptive Learning Platform</title>
<style>
:root {
  --bg: #0b1a0e;
  --surface: #0f2213;
  --surface2: #142e19;
  --surface3: #1c3d22;
  --border: #1e4a26;
  --text: #d8e8d0;
  --text2: #7ea57a;
  --accent: #3daa5c;
  --accent2: #5ec97b;
  --green: #34d399;
  --red: #e8735a;
  --brown: #a68b5b;
  --gold: #d4a843;
  --leaf: #2d8a4e;
  --bark: #6b4a30;
  --sky: #4a7a8a;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Georgia', 'Palatino', 'Times New Roman', serif; min-height: 100vh; }
a { color: var(--accent2); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Top Nav ── */
.topnav {
  background: linear-gradient(180deg, #0d1e10 0%, var(--surface) 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topnav .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
.topnav .logo span { background: linear-gradient(135deg, var(--accent), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.topnav .nav-links { display: flex; gap: 4px; margin-left: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.topnav .nav-links a { padding: 6px 14px; border-radius: 8px; font-size: 14px; color: var(--text2); transition: all 0.15s; text-decoration: none; }
.topnav .nav-links a:hover, .topnav .nav-links a.active { background: var(--surface2); color: var(--text); }
.nav-right { margin-left: auto; display: flex; gap: 8px; align-items: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.btn:hover { border-color: var(--accent); text-decoration: none; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.user-chip { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px 4px 4px; font-size: 13px; }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }
.role-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; font-family: -apple-system, sans-serif; }
.role-badge.student { background: rgba(52,211,153,0.15); color: var(--green); }
.role-badge.professor { background: rgba(61,170,92,0.2); color: var(--accent2); }

/* ── Hero ── */
.hero {
  text-align: center;
  padding: 0;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  min-height: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Forest background - realistic photo */
.forest-scene {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  background: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=80') center/cover no-repeat;
}

/* Dark overlay for text readability */
.forest-scene::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    rgba(11, 26, 14, 0.55) 0%,
    rgba(11, 26, 14, 0.4) 40%,
    rgba(11, 26, 14, 0.6) 70%,
    rgba(11, 26, 14, 0.92) 100%);
  z-index: 1;
}

/* Subtle animated light rays through trees */
.forest-scene::after {
  content: '';
  position: absolute;
  top: -20%;
  left: 30%;
  width: 40%;
  height: 120%;
  background: linear-gradient(180deg,
    rgba(212, 168, 67, 0.08) 0%,
    rgba(94, 201, 123, 0.04) 50%,
    transparent 100%);
  transform: skewX(-15deg);
  z-index: 2;
  animation: lightRay 8s ease-in-out infinite alternate;
}

@keyframes lightRay {
  0% { opacity: 0.4; transform: skewX(-15deg) translateX(-20px); }
  100% { opacity: 0.8; transform: skewX(-12deg) translateX(20px); }
}

/* Fireflies / light particles */
.firefly {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px 2px rgba(212, 168, 67, 0.4);
  animation: float 6s ease-in-out infinite;
  z-index: 3;
}
.firefly:nth-child(1) { top: 30%; left: 20%; animation-delay: 0s; animation-duration: 7s; }
.firefly:nth-child(2) { top: 40%; left: 70%; animation-delay: 2s; animation-duration: 5s; }
.firefly:nth-child(3) { top: 25%; left: 45%; animation-delay: 1s; animation-duration: 8s; }
.firefly:nth-child(4) { top: 55%; left: 80%; animation-delay: 3s; animation-duration: 6s; }
.firefly:nth-child(5) { top: 35%; left: 35%; animation-delay: 4s; animation-duration: 7.5s; }

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
  25% { transform: translate(10px, -15px) scale(1.2); opacity: 1; }
  50% { transform: translate(-5px, -25px) scale(0.8); opacity: 0.6; }
  75% { transform: translate(15px, -10px) scale(1.1); opacity: 0.9; }
}

.hero-content {
  position: relative;
  z-index: 5;
  padding: 80px 24px 60px;
}
.hero h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 16px; }
.hero h1 span { background: linear-gradient(135deg, var(--accent2), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero p { font-size: 1.1rem; color: var(--text2); max-width: 520px; margin: 0 auto 32px; line-height: 1.6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.hero-stats { display: flex; gap: 40px; justify-content: center; margin-top: 48px; flex-wrap: wrap; }
.hero-stat .num { font-size: 2rem; font-weight: 700; color: var(--accent2); }
.hero-stat .lbl { font-size: 13px; color: var(--text2); margin-top: 4px; font-family: -apple-system, sans-serif; }

/* Bird song audio hint */
.audio-toggle {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 10;
  background: rgba(15, 34, 19, 0.7);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 16px;
  transition: all 0.2s;
}
.audio-toggle:hover { background: var(--surface2); color: var(--text); }

/* ── Welcome back banner ── */
.welcome-banner {
  background: linear-gradient(135deg, rgba(61,170,92,0.12), rgba(212,168,67,0.08));
  border: 1px solid rgba(61,170,92,0.25);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}
.welcome-banner .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0; }
.welcome-banner h2 { font-size: 1.1rem; margin-bottom: 4px; }
.welcome-banner p { font-size: 14px; color: var(--text2); font-family: -apple-system, sans-serif; }

/* ── Main content ── */
.main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* ── Section headings ── */
.section-hd { font-size: 1.05rem; font-weight: 700; color: var(--text); margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
.section-hd .see-all { margin-left: auto; font-size: 12px; color: var(--accent2); font-weight: 500; }

/* ── Quick action cards ── */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 36px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.2s;
  text-decoration: none;
  color: inherit;
  display: block;
  cursor: pointer;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(61,170,92,0.12); text-decoration: none; }
.card .card-icon { font-size: 1.4rem; margin-bottom: 12px; color: var(--accent2); font-weight: 700; }
.card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
.card p { font-size: 13px; color: var(--text2); line-height: 1.5; }
.card .card-tag { display: inline-block; margin-top: 10px; font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
.tag-student { background: rgba(52,211,153,0.12); color: var(--green); }
.tag-professor { background: rgba(61,170,92,0.15); color: var(--accent2); }
.tag-all { background: rgba(212,168,67,0.12); color: var(--gold); }
.card.locked { opacity: 0.6; cursor: default; }
.card.locked:hover { border-color: var(--border); transform: none; box-shadow: none; }
.lock-overlay { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; color: var(--text2); }

/* ── Enrollments / course list ── */
.enroll-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
.enroll-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; transition: border-color 0.15s; }
.enroll-item:hover { border-color: var(--accent); text-decoration: none; }
.enroll-icon { font-size: 1.2rem; flex-shrink: 0; color: var(--accent2); }
.enroll-info { flex: 1; min-width: 0; }
.enroll-info h4 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.enroll-info p { font-size: 12px; color: var(--text2); margin-top: 2px; }
.enroll-arrow { color: var(--text2); font-size: 16px; flex-shrink: 0; }
.empty-state { text-align: center; padding: 32px; color: var(--text2); font-size: 14px; }
.empty-state .big { font-size: 2rem; margin-bottom: 8px; }

/* ── Two-col layout for logged-in ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } .hero h1 { font-size: 2rem; } }

/* ── Unauthenticated split layout ── */
.roles-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 36px; }
@media (max-width: 640px) { .roles-split { grid-template-columns: 1fr; } }
.role-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  text-align: center;
  transition: all 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
}
.role-card:hover { text-decoration: none; }
.role-card.student-card:hover { border-color: var(--green); box-shadow: 0 6px 28px rgba(52,211,153,0.1); }
.role-card.professor-card:hover { border-color: var(--accent); box-shadow: 0 6px 28px rgba(61,170,92,0.12); }
.role-card .role-icon-text { font-size: 1.5rem; margin-bottom: 12px; color: var(--accent2); font-weight: 700; }
.role-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
.role-card p { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 16px; }
.role-card ul { text-align: left; font-size: 13px; color: var(--text2); list-style: none; padding: 0; margin-bottom: 20px; }
.role-card ul li { padding: 4px 0; display: flex; align-items: center; gap: 8px; }
.role-card ul li::before { content: "\2713"; color: var(--green); font-weight: 700; }
.role-card .cta-btn { display: block; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: all 0.15s; }
.student-card .cta-btn { background: rgba(52,211,153,0.12); color: var(--green); }
.student-card .cta-btn:hover { background: rgba(52,211,153,0.2); }
.professor-card .cta-btn { background: rgba(61,170,92,0.12); color: var(--accent2); }
.professor-card .cta-btn:hover { background: rgba(61,170,92,0.2); }

/* ── Featured courses mini ── */
.featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 36px; }
.featured-course { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-decoration: none; color: inherit; transition: all 0.15s; display: block; }
.featured-course:hover { border-color: var(--accent); text-decoration: none; }
.featured-course .fc-tag { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.featured-course h4 { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 6px; }
.featured-course .fc-meta { font-size: 11px; color: var(--text2); display: flex; gap: 10px; }

/* ── Footer ── */
footer { text-align: center; padding: 32px 24px; color: var(--text2); font-size: 13px; border-top: 1px solid var(--border); margin-top: 40px; font-family: -apple-system, sans-serif; }
footer a { color: var(--accent2); }
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="logo"><span>CourseForge</span></a>
  <div class="nav-links">
    <a href="/" class="active">Home</a>
    <a href="/store.html">Store</a>
    <a href="/player.html">Play</a>
    <a href="/course-database.html">Browse</a>
  </div>
  <div class="nav-right" id="nav-right">
    <a href="/login.html" class="btn">Sign In</a>
    <a href="/login.html?tab=register" class="btn btn-primary">Get Started</a>
  </div>
</nav>

<div id="hero-section">
  <!-- Rendered by JS based on auth state -->
</div>

<div class="main" id="main-content">
  <!-- Rendered by JS based on auth state -->
</div>

<footer>
  CourseForge &mdash; Adaptive branching courses &mdash;
  <a href="/manual.html">Docs</a> &bull;
  <a href="/store.html">Store</a> &bull;
  <a href="/player.html">Player</a> &bull;
  <a href="#" id="footer-signin">Sign In</a> &bull;
  <a href="#" onclick="Silva.showHelpOverlay();return false;">Shortcuts</a>
</footer>

<script src="/silva-common.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  Silva.injectNavWidget('#nav-right');
  document.getElementById('footer-signin')?.addEventListener('click', (e) => {
    e.preventDefault();
    if (Silva.auth.isAuthenticated) Silva.auth.logout();
    else Silva.openSignInModal('login');
  });
});
</script>

<script>
const user = Silva.auth.user;
const token = Silva.auth.token;
const isProf = Silva.auth.isInstructor;
const isStudent = Silva.auth.isStudent;

// ── Nav: update with user info ──
// Nav chip / sign-in buttons are rendered by Silva.injectNavWidget().
// This only extends the primary nav-links with role-specific items.
function renderNav() {
  if (!user) return;
  const links = document.querySelector('.nav-links');
  if (!links) return;
  if (isProf) {
    links.insertAdjacentHTML('beforeend', `
      <a href="/course-editor-enhanced.html">Editor</a>
      <a href="/instructor-dashboard.html">Dashboard</a>
      <a href="#" onclick="scrollToMyCourses();return false;">My Courses</a>
    `);
  } else if (isStudent) {
    links.insertAdjacentHTML('beforeend', `<a href="#" onclick="scrollToMyCourses();return false;">My Courses</a>`);
  }
}

function scrollToMyCourses() {
  const el = document.getElementById('my-courses-section');
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
}

function logout() { Silva.auth.logout(); }

// ── Audio toggle ──
// Ambient sound now lives in Silva.radio (silva-common.js).
function toggleAudio() { Silva.radio.toggle(); }

// ── Hero section ──
function renderHero() {
  const hero = document.getElementById('hero-section');
  const forestScene = `
    <div class="forest-scene">
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
    </div>
  `;

  if (!user) {
    hero.innerHTML = `
      <div class="hero">
        ${forestScene}
        <button class="audio-toggle" id="audio-btn" onclick="toggleAudio()" title="Play forest sounds">\u266A</button>
        <div class="hero-content">
          <h1>Learn Through <span>Adaptive Paths</span></h1>
          <p>CourseForge delivers branching, interactive courses that adapt to your choices. Every learner forges their own trail through the forest of knowledge.</p>
          <div class="hero-btns">
            <a href="/store.html" class="btn btn-primary" style="font-size:15px;padding:11px 24px;">Browse Courses</a>
            <a href="/login.html?tab=register" class="btn" style="font-size:15px;padding:11px 24px;">Get Started Free</a>
          </div>
          <div class="hero-stats" id="hero-stats">
            <div class="hero-stat"><div class="num" id="stat-courses">...</div><div class="lbl">Courses</div></div>
            <div class="hero-stat"><div class="num">10</div><div class="lbl">Node Types</div></div>
            <div class="hero-stat"><div class="num">\u221E</div><div class="lbl">Unique Paths</div></div>
          </div>
        </div>
      </div>`;
    fetch('/api/courses').then(r=>r.json()).then(d=>{
      const el = document.getElementById('stat-courses');
      if (el) el.textContent = d.generated || d.courses?.length || '--';
    }).catch(()=>{});
  } else {
    const name = user.display_name || user.username;
    const subtitle = isProf ? 'Manage your courses, track students, and create new content.' : 'Continue learning or discover new courses.';
    hero.innerHTML = `
      <div style="background:linear-gradient(180deg,rgba(61,170,92,0.07) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:32px 24px 0;">
        <div style="max-width:1100px;margin:0 auto;">
          <div class="welcome-banner">
            <div class="avatar">${(name||'?').charAt(0).toUpperCase()}</div>
            <div>
              <h2>Welcome back, ${name}!</h2>
              <p>${subtitle}</p>
            </div>
            ${isProf ? '<a href="/course-editor-enhanced.html" class="btn btn-primary" style="margin-left:auto;flex-shrink:0;">+ New Course</a>' : '<a href="/store.html" class="btn btn-primary" style="margin-left:auto;flex-shrink:0;">Browse Store</a>'}
          </div>
        </div>
      </div>`;
  }
}

// ── Main content ──
async function renderMain() {
  const main = document.getElementById('main-content');

  if (!user) {
    main.innerHTML = `
      <div style="margin-bottom:10px;text-align:center;">
        <p style="color:var(--text2);font-size:14px;margin-bottom:20px;">Choose how you want to use CourseForge:</p>
      </div>
      <div class="roles-split">
        <a href="/login.html?tab=register&role=student" class="role-card student-card">
          <div class="role-icon-text">Student</div>
          <h3>I'm a Student</h3>
          <p>Learn through adaptive, branching courses at your own pace.</p>
          <ul>
            <li>Browse the course store</li>
            <li>Enroll with instructors</li>
            <li>Track your progress</li>
            <li>Explore multiple learning paths</li>
          </ul>
          <span class="cta-btn">Register as Student &rarr;</span>
        </a>
        <a href="/login.html?tab=register&role=professor" class="role-card professor-card">
          <div class="role-icon-text">Professor</div>
          <h3>I'm a Professor</h3>
          <p>Create and publish branching courses. Manage students and analytics.</p>
          <ul>
            <li>Visual course editor</li>
            <li>Publish to the store</li>
            <li>Student enrollment management</li>
            <li>Analytics & completion tracking</li>
          </ul>
          <span class="cta-btn">Register as Professor &rarr;</span>
        </a>
      </div>
      <div class="section-hd">
        <span>Featured Courses</span>
        <a href="/store.html" class="see-all">See all &rarr;</a>
      </div>
      <div class="featured-grid" id="featured-grid"><div style="color:var(--text2);font-size:13px;">Loading courses...</div></div>
    `;
    loadFeaturedCourses();

  } else if (isStudent) {
    main.innerHTML = `
      <div class="two-col">
        <div id="my-courses-section">
          <div class="section-hd"><span>My Courses</span><a href="/store.html" class="see-all">Find more &rarr;</a></div>
          <div class="enroll-list" id="my-courses-list"><div class="empty-state"><div class="big">...</div>Loading your courses...</div></div>
        </div>
        <div>
          <div class="section-hd"><span>Quick Actions</span></div>
          <div class="cards-grid" style="grid-template-columns:1fr;gap:10px;">
            <a href="/store.html" class="card">
              <div class="card-icon">Store</div>
              <h3>Course Store</h3>
              <p>Browse and enroll in courses from our instructors.</p>
              <span class="card-tag tag-student">Student</span>
            </a>
            <a href="/course-database.html" class="card">
              <div class="card-icon">Catalog</div>
              <h3>All Courses</h3>
              <p>Browse the full catalog with filters and search.</p>
              <span class="card-tag tag-all">Everyone</span>
            </a>
            <a href="/player.html" class="card">
              <div class="card-icon">Play</div>
              <h3>Course Player</h3>
              <p>Jump into any course and start learning.</p>
              <span class="card-tag tag-all">Everyone</span>
            </a>
            <div class="card" onclick="document.getElementById('enroll-code-form').style.display=document.getElementById('enroll-code-form').style.display==='none'?'block':'none'" style="cursor:pointer;">
              <div class="card-icon">Code</div>
              <h3>Join with Code</h3>
              <p>Have an enrollment code from your instructor? Enter it here.</p>
              <span class="card-tag tag-student">Student</span>
            </div>
          </div>
          <div id="enroll-code-form" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:10px;">
            <div style="font-size:14px;font-weight:600;margin-bottom:10px;">Enter Enrollment Code</div>
            <div style="display:flex;gap:8px;">
              <input id="enroll-code-input" type="text" placeholder="e.g. CF-ABCD1234" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:14px;outline:none;" />
              <button onclick="redeemCode()" style="padding:9px 18px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;">Join</button>
            </div>
            <div id="enroll-code-msg" style="font-size:13px;margin-top:8px;display:none;"></div>
          </div>
        </div>
      </div>
      <div class="section-hd" style="margin-top:8px;"><span>Discover Courses</span><a href="/store.html" class="see-all">See all &rarr;</a></div>
      <div class="featured-grid" id="featured-grid"></div>
    `;
    loadMyCourses();
    loadFeaturedCourses();

  } else if (isProf) {
    main.innerHTML = `
      <div class="section-hd"><span>Quick Actions</span></div>
      <div class="cards-grid" style="margin-bottom:32px;">
        <a href="/course-editor-enhanced.html" class="card">
          <div class="card-icon">Editor</div>
          <h3>Course Editor</h3>
          <p>Visual drag-and-drop editor. Create branching courses with the node graph.</p>
          <span class="card-tag tag-professor">Professor</span>
        </a>
        <a href="/instructor-dashboard.html" class="card">
          <div class="card-icon">Dashboard</div>
          <h3>Instructor Dashboard</h3>
          <p>Student enrollments, completion rates, analytics, and revenue.</p>
          <span class="card-tag tag-professor">Professor</span>
        </a>
        <a href="/store.html" class="card">
          <div class="card-icon">Store</div>
          <h3>Course Store</h3>
          <p>Browse the store, manage your published courses, and set pricing.</p>
          <span class="card-tag tag-all">Everyone</span>
        </a>
        <a href="/course-database.html" class="card">
          <div class="card-icon">Catalog</div>
          <h3>Course Catalog</h3>
          <p>Full catalog with search, filters, and management tools.</p>
          <span class="card-tag tag-all">Everyone</span>
        </a>
        <a href="/tutorial.html" class="card">
          <div class="card-icon">Tutorial</div>
          <h3>Editor Tutorial</h3>
          <p>Step-by-step guide to using all editor features.</p>
          <span class="card-tag tag-professor">Professor</span>
        </a>
        <a href="/manual.html" class="card">
          <div class="card-icon">Manual</div>
          <h3>Reference Manual</h3>
          <p>Full docs: node types, connections, attributes, expressions.</p>
          <span class="card-tag tag-all">Everyone</span>
        </a>
      </div>
      <div class="section-hd" id="my-courses-section"><span>My Courses</span><a href="/course-editor-enhanced.html" class="see-all">+ New course &rarr;</a></div>
      <div class="enroll-list" id="my-courses-list" style="margin-bottom:24px;"><div class="empty-state"><div class="big">...</div>Loading your courses...</div></div>
      <div class="section-hd"><span>Enrollment Codes</span><a href="/instructor-dashboard.html" class="see-all">Dashboard &rarr;</a></div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:24px;">
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px;">Generate a code your students can use to enroll in one of your courses.</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <select id="code-course-select" style="flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:13px;outline:none;">
            <option value="">Select a course...</option>
          </select>
          <button onclick="generateCode()" style="padding:9px 16px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">Generate Code</button>
        </div>
        <div id="generated-code-display" style="display:none;margin-top:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span style="font-family:monospace;font-size:16px;font-weight:700;letter-spacing:2px;" id="generated-code-text"></span>
          <button onclick="copyCode()" style="padding:5px 12px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;">Copy</button>
          <span style="font-size:12px;color:var(--text2);" id="code-course-name"></span>
        </div>
      </div>
      <div class="section-hd"><span>My Students</span><a href="/instructor-dashboard.html" class="see-all">Full dashboard &rarr;</a></div>
      <div id="students-preview"><div class="empty-state"><div class="big">...</div>Loading...</div></div>
    `;
    loadStudentsPreview();
    loadProfCourses();
    loadMyCourses();
  }
}

async function loadMyCourses() {
  const list = document.getElementById('my-courses-list');
  if (!list) return;
  try {
    const res = await Silva.apiFetch('/api/my-courses');
    const data = await res.json();
    const courses = data.courses || [];
    if (!courses.length) {
      list.innerHTML = `<div class="empty-state"><div class="big">--</div>No courses yet.<br>${Silva.auth.isInstructor ? '<a href="/course-editor-enhanced.html">Create your first course</a>' : '<a href="/store.html">Browse the store</a> to get started.'}</div>`;
      return;
    }
    list.innerHTML = courses.map(c => `
      <a href="/player.html?course=${c.id}" class="enroll-item">
        <div class="enroll-icon">&gt;</div>
        <div class="enroll-info">
          <h4>${escHtml(c.title || c.id)}</h4>
          <p>${escHtml(c.topic || 'General')} &bull; ${escHtml(c.difficulty || 'beginner')} &bull; updated ${fmtDate(c.updated_at)}</p>
        </div>
        ${Silva.auth.isInstructor ? `<a class="enroll-arrow" href="/course-editor-enhanced.html?load=${c.id}" onclick="event.stopPropagation();" title="Edit">&#9998;</a>` : '<span class="enroll-arrow">&rsaquo;</span>'}
      </a>`).join('');
  } catch(e) {
    list.innerHTML = `<div class="empty-state">Could not load your courses.</div>`;
  }
}

async function loadFeaturedCourses() {
  const grid = document.getElementById('featured-grid');
  if (!grid) return;
  try {
    const res = await fetch('/api/courses');
    const data = await res.json();
    const courses = (data.courses || []).slice(0, 8);
    if (!courses.length) { grid.innerHTML = '<div class="empty-state">No courses yet.</div>'; return; }
    grid.innerHTML = courses.map(c => `
      <a href="/player.html?course=${c.id}" class="featured-course">
        <div class="fc-tag">${c.topic || 'General'} &bull; ${c.difficulty || 'beginner'}</div>
        <h4>${escHtml(c.title)}</h4>
        <div class="fc-meta">
          <span>${c.node_count || 0} nodes</span>
          <span>${c.estimated_minutes || 15}m</span>
        </div>
      </a>`).join('');
  } catch(e) {
    grid.innerHTML = '<div class="empty-state">Could not load courses.</div>';
  }
}

async function redeemCode() {
  const code = document.getElementById('enroll-code-input').value.trim();
  const msgEl = document.getElementById('enroll-code-msg');
  if (!code) return;
  msgEl.style.display = 'block';
  msgEl.style.color = 'var(--text2)';
  msgEl.textContent = 'Joining...';
  try {
    const res = await fetch('/api/enrollment-codes/redeem', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if (!res.ok) {
      msgEl.style.color = 'var(--red)';
      msgEl.textContent = 'Error: ' + (data.detail || 'Invalid code');
    } else {
      msgEl.style.color = 'var(--green)';
      msgEl.textContent = 'Enrolled! Refreshing...';
      setTimeout(() => location.reload(), 1200);
    }
  } catch(e) {
    msgEl.style.color = 'var(--red)';
    msgEl.textContent = 'Network error';
  }
}

async function loadEnrollments() {
  const list = document.getElementById('enrollment-list');
  if (!list) return;
  try {
    const [enrollRes, catRes] = await Promise.all([
      fetch('/api/my-enrollments', { headers: { Authorization: 'Bearer ' + token } }),
      fetch('/api/courses')
    ]);
    const enrollData = await enrollRes.json();
    const catData = catRes.ok ? await catRes.json() : { courses: [] };
    const titleMap = {};
    (catData.courses || []).forEach(c => { titleMap[c.id] = c.title; });

    const enrollments = enrollData.enrollments || [];
    if (!enrollments.length) {
      list.innerHTML = `<div class="empty-state"><div class="big">--</div>No enrollments yet.<br><a href="/store.html">Browse the store</a> to get started.</div>`;
      return;
    }
    list.innerHTML = enrollments.map(e => `
      <a href="/player.html?course=${e.course_id}" class="enroll-item">
        <div class="enroll-icon">&gt;</div>
        <div class="enroll-info">
          <h4>${escHtml(titleMap[e.course_id] || e.course_id)}</h4>
          <p>Instructor: ${escHtml(e.instructor_name || 'Unknown')} &bull; Enrolled ${fmtDate(e.enrolled_at)}</p>
        </div>
        <span class="enroll-arrow">&rsaquo;</span>
      </a>`).join('');
  } catch(e) {
    list.innerHTML = `<div class="empty-state">Could not load enrollments.</div>`;
  }
}

async function loadStudentsPreview() {
  const el = document.getElementById('students-preview');
  if (!el) return;
  try {
    const res = await fetch('/api/instructor/students', { headers: { Authorization: 'Bearer ' + token } });
    const data = await res.json();
    const students = data.students || [];
    if (!students.length) {
      el.innerHTML = `<div class="empty-state"><div class="big">--</div>No students enrolled yet.<br>Publish a course to get started.</div>`;
      return;
    }
    el.innerHTML = `<div class="enroll-list">` + students.slice(0,5).map(s => `
      <div class="enroll-item" style="text-decoration:none;cursor:default;">
        <div class="enroll-icon">&bull;</div>
        <div class="enroll-info">
          <h4>${escHtml(s.student_name || s.username)}</h4>
          <p>${escHtml(s.student_email || '')} &bull; Course: ${escHtml(s.course_id)} &bull; Enrolled ${fmtDate(s.enrolled_at)}</p>
        </div>
        <span class="role-badge student">Student</span>
      </div>`).join('') + `</div>` +
      (students.length > 5 ? `<div style="text-align:center;margin-top:8px;"><a href="/instructor-dashboard.html">View all ${students.length} students &rarr;</a></div>` : '');
  } catch(e) {
    el.innerHTML = `<div class="empty-state">Could not load students.</div>`;
  }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString(); } catch(e) { return iso; }
}

let _generatedCode = '';
async function generateCode() {
  const sel = document.getElementById('code-course-select');
  const courseId = sel ? sel.value : '';
  if (!courseId) { alert('Please select a course first.'); return; }
  try {
    const res = await fetch('/api/enrollment-codes/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ course_id: courseId, max_uses: 200 })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.detail || 'Error generating code'); return; }
    _generatedCode = data.code;
    const codeEl = document.getElementById('generated-code-text');
    const dispEl = document.getElementById('generated-code-display');
    const nameEl = document.getElementById('code-course-name');
    if (codeEl) codeEl.textContent = data.code;
    if (nameEl) nameEl.textContent = 'Course: ' + (data.course_id || courseId);
    if (dispEl) dispEl.style.display = 'flex';
  } catch(e) {
    alert('Network error generating code');
  }
}
function copyCode() {
  if (_generatedCode) {
    navigator.clipboard.writeText(_generatedCode).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
    });
  }
}
async function loadProfCourses() {
  const sel = document.getElementById('code-course-select');
  if (!sel) return;
  try {
    const res = await fetch('/api/courses', { headers: { Authorization: 'Bearer ' + token } });
    const data = await res.json();
    const courses = (data.courses || []).filter(c => c.instructor_id || true);
    sel.innerHTML = '<option value="">Select a course...</option>' +
      courses.slice(0, 50).map(c => `<option value="${c.id}">${escHtml(c.title || c.id)}</option>`).join('');
  } catch(e) {}
}

renderNav();
renderHero();
renderMain();

// Show redirect messages
(function() {
  const params = new URLSearchParams(location.search);
  const msg = params.get('msg');
  if (msg === 'instructor_only') {
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;top:64px;left:50%;transform:translateX(-50%);background:rgba(61,170,92,0.15);border:1px solid #3daa5c;color:#5ec97b;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;text-align:center;';
    banner.textContent = 'The Course Editor is for instructors only. Upgrade to a professor account to access it.';
    document.body.appendChild(banner);
    setTimeout(() => banner.remove(), 6000);
  }
})();
</script>
