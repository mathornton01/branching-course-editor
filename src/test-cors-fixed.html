<!DOCTYPE html>
<html>
<head>
    <title>Test CORS Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="status" class="p-4 bg-gray-50 rounded">Testing...</div>
    <select id="courseSelect" class="mt-4 p-2 border w-64"></select>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const status = document.getElementById('status');
            const courseSelect = document.getElementById('courseSelect');
            
            status.textContent = 'Loading courses...';
            status.className = 'p-4 bg-blue-50 rounded';
            
            fetch('http://localhost:8001/api/courses')
                .then(response => {
                    console.log('Response status:', response.status);
                    console.log('Response headers:', Object.fromEntries(response.headers.entries()));
                    return response.json();
                })
                .then(courses => {
                    status.textContent = `✅ Loaded ${courses.length} course(s)!`;
                    status.className = 'p-4 bg-green-50 rounded';
                    
                    courseSelect.innerHTML = '<option value="">Select a course...</option>';
                    courses.forEach(course => {
                        const option = document.createElement('option');
                        option.value = course.id;
                        option.textContent = course.title;
                        courseSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    status.textContent = `❌ Error: ${error.message}`;
                    status.className = 'p-4 bg-red-50 rounded';
                    console.error('Error:', error);
                });
        });
    </script>
</body>
</html>
