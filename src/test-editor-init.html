<!DOCTYPE html>
<html>
<head>
    <title>Test Editor Initialization</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="p-4">
        <h1 class="text-2xl font-bold mb-4">Testing Editor Initialization</h1>
        <div id="status" class="mb-4 p-2 bg-gray-100 rounded">Initializing...</div>
        <div id="result"></div>
    </div>
    
    <script>
        // Test the exact same initialization as the editor
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('status').textContent = 'DOM loaded, testing API...';
            document.getElementById('status').className = 'mb-4 p-2 bg-blue-100 rounded';
            
            // Test loadCourses function (same as in editor)
            fetch('http://localhost:8001/api/courses')
                .then(response => {
                    console.log('API response status:', response.status);
                    document.getElementById('status').textContent = `API responded with status: ${response.status}`;
                    document.getElementById('status').className = 'mb-4 p-2 bg-green-100 rounded';
                    return response.json();
                })
                .then(courses => {
                    document.getElementById('result').innerHTML = `
                        <h2 class="text-xl font-bold mb-2">✅ API Test Successful!</h2>
                        <p>Found ${courses.length} course(s):</p>
                        <div class="bg-white p-4 rounded-md shadow">
                            <pre>${JSON.stringify(courses, null, 2)}</pre>
                        </div>
                        
                        <div class="mt-4">
                            <h3 class="font-semibold mb-2">Testing course population:</h3>
                            <select id="testSelect" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">Select a course...</option>
                            </select>
                        </div>
                    `;
                    
                    // Populate test select
                    const select = document.getElementById('testSelect');
                    courses.forEach(course => {
                        const option = document.createElement('option');
                        option.value = course.id;
                        option.textContent = course.title;
                        select.appendChild(option);
                    });
                    
                })
                .catch(error => {
                    document.getElementById('status').textContent = `❌ API Error: ${error.message}`;
                    document.getElementById('status').className = 'mb-4 p-2 bg-red-100 rounded';
                    document.getElementById('result').innerHTML = `<pre>${error}</pre>`;
                });
        });
    </script>
</body>
</html>
