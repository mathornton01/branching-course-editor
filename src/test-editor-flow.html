<!DOCTYPE html>
<html>
<head>
    <title>Test Editor Flow - REAL TEST</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <h2 class="text-xl font-bold mb-4">Testing Editor's Actual Course Loading Flow</h2>
    <div id="test-result" class="mb-4 p-4 bg-gray-50 rounded">
        Initializing test...
    </div>
    <div id="course-select-test" class="mt-4 p-4 bg-white rounded">
        <label class="block text-sm font-medium text-gray-700 mb-1">Course Select Test:</label>
        <select id="course-select-output" class="w-64 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Not loaded yet</option>
        </select>
    </div>
    
    <script>
        // EXACT COPY of the editor's course loading code
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded fired in test');
            
            const resultDiv = document.getElementById('test-result');
            const selectDiv = document.getElementById('course-select-test');
            const courseSelect = document.getElementById('course-select-output');
            
            resultDiv.innerHTML = '<div class="bg-blue-100 p-2 rounded">🔄 About to fetch courses from API...</div>';
            
            // THIS IS THE EXACT CODE FROM THE EDITOR
            fetch('http://localhost:8001/api/courses')
                .then(response => {
                    console.log('API response received:', response.status, response.statusText);
                    resultDiv.innerHTML += `<div class="bg-green-100 p-2 rounded mt-2">✅ API responded: ${response.status} ${response.statusText}</div>`;
                    return response.json();
                })
                .then(courses => {
                    console.log('Courses received:', courses);
                    resultDiv.innerHTML += `<div class="bg-green-100 p-2 rounded mt-2">✅ Received ${courses.length} course(s)</div>`;
                    
                    // Update the select like the editor does
                    courseSelect.innerHTML = '<option value="">Select a course...</option>';
                    courses.forEach(course => {
                        const option = document.createElement('option');
                        option.value = course.id;
                        option.textContent = course.title;
                        courseSelect.appendChild(option);
                    });
                    
                    resultDiv.innerHTML += `<div class="bg-green-100 p-2 rounded mt-2">✅ Dropdown populated with ${courses.length} options</div>`;
                    selectDiv.innerHTML += '<p class="mt-2 text-green-600 font-medium">SUCCESS: Course loading working correctly!</p>';
                })
                .catch(error => {
                    console.error('API Error:', error);
                    resultDiv.innerHTML += `<div class="bg-red-100 p-2 rounded mt-2">❌ Fetch failed: ${error.message}</div>`;
                    courseSelect.innerHTML = '<option value="">Error loading courses</option>';
                    selectDiv.innerHTML += '<p class="mt-2 text-red-600 font-medium">ERROR: Course loading failed</p>';
                });
        });
    </script>
</body>
</html>
