<!DOCTYPE html>
<html>
<head>
    <title>Test DOM Loading</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4">
    <h1 class="text-2xl font-bold mb-4">Test DOM Loading</h1>
    <div id="status" class="mb-4 p-2 bg-gray-100 rounded">Waiting for DOM...</div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('status').textContent = 'DOM loaded successfully!';
            document.getElementById('status').className = 'mb-4 p-2 bg-green-100 rounded';
            console.log('DOMContentLoaded fired');
        });
        
        window.addEventListener('load', function() {
            console.log('Window load fired');
        });
    </script>
</body>
</html>
