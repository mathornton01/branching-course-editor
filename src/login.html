<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - CourseForge</title>
<style>
:root {
  --bg: #0a0b10;
  --surface: #13151e;
  --surface2: #1c1f2e;
  --surface3: #252840;
  --border: #2a2d45;
  --text: #e8eaf4;
  --text2: #8890ab;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #34d399;
  --red: #f87171;
  --purple: #a78bfa;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Top nav */
.topnav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.topnav .logo {
  font-size: 18px;
  font-weight: 700;
  text-decoration: none;
  color: var(--text);
}
.topnav .logo span {
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.topnav .back-home {
  color: var(--text2);
  font-size: 13px;
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 8px;
  transition: all 0.15s;
}
.topnav .back-home:hover { background: var(--surface2); color: var(--text); }

/* Main layout */
.page {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px;
  width: 100%;
  max-width: 460px;
}
.card-header {
  text-align: center;
  margin-bottom: 28px;
}
.card-header .icon { font-size: 2.5rem; margin-bottom: 12px; }
.card-header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
.card-header p { color: var(--text2); font-size: 14px; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--surface2);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
}
.tab-btn {
  flex: 1;
  padding: 8px;
  border: none;
  background: none;
  color: var(--text2);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 7px;
  transition: all 0.15s;
}
.tab-btn.active {
  background: var(--surface3);
  color: var(--text);
  border: 1px solid var(--border);
}

/* Role picker (register only) */
.role-picker {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.role-card {
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 16px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.role-card:hover { border-color: var(--accent2); }
.role-card.selected { border-color: var(--accent); background: rgba(99,102,241,0.1); }
.role-card .role-icon { font-size: 1.8rem; margin-bottom: 6px; }
.role-card .role-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.role-card .role-desc { font-size: 12px; color: var(--text2); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 500;
}
.form-group input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
.form-group input:focus { border-color: var(--accent); }
.form-group input::placeholder { color: var(--text2); }

.btn-submit {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 8px;
}
.btn-submit:hover { background: var(--accent2); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

.msg {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
.msg.error { background: rgba(248,113,113,0.1); border: 1px solid var(--red); color: var(--red); }
.msg.success { background: rgba(52,211,153,0.1); border: 1px solid var(--green); color: var(--green); }
.msg.info { background: rgba(99,102,241,0.1); border: 1px solid var(--accent); color: var(--accent2); }
.msg.show { display: block; }

.form-footer {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  color: var(--text2);
}
.form-footer a { color: var(--accent2); text-decoration: none; }
.form-footer a:hover { text-decoration: underline; }

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 20px 0;
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="logo">🎓 <span>CourseForge</span></a>
  <a href="/" class="back-home">← Home</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="icon">🔐</div>
      <h1>Welcome back</h1>
      <p>Sign in to your account or create a new one</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- Login form -->
    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Email or Username</label>
        <input type="text" id="login-id" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pw" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
    </form>

    <!-- Register form -->
    <form id="register-form" style="display:none" onsubmit="doRegister(event)">
      <div class="role-picker">
        <div class="role-card selected" id="role-student" onclick="selectRole('student')">
          <div class="role-icon">🎓</div>
          <div class="role-name">Student</div>
          <div class="role-desc">Browse & take courses</div>
        </div>
        <div class="role-card" id="role-professor" onclick="selectRole('professor')">
          <div class="role-icon">👨‍🏫</div>
          <div class="role-name">Professor</div>
          <div class="role-desc">Create & manage courses</div>
        </div>
      </div>

      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="reg-name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-user" placeholder="username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pw" placeholder="At least 8 characters" minlength="8" required>
      </div>
      <button type="submit" class="btn-submit" id="register-btn">Create Account</button>
    </form>

    <div class="form-footer" id="login-footer">
      Don't have an account? <a href="#" onclick="switchTab('register');return false;">Create one</a>
    </div>
    <div class="form-footer" id="register-footer" style="display:none">
      Already have an account? <a href="#" onclick="switchTab('login');return false;">Sign in</a>
    </div>
  </div>
</div>

<script>
let selectedRole = 'student';

// If already logged in, redirect
const token = localStorage.getItem('auth_token');
if (token) {
  const next = new URLSearchParams(location.search).get('next') || '/';
  location.href = next;
}

// Show context messages from ?msg= param
(function() {
  const params = new URLSearchParams(location.search);
  const msg = params.get('msg');
  const tab = params.get('tab');
  if (tab === 'register') { document.addEventListener('DOMContentLoaded', () => switchTab('register')); }
  const msgs = {
    signin: '🔒 Sign in or register to access CourseForge content.',
    instructor_only: '🎓 That page is for instructors only. Register as a professor to get access.',
  };
  if (msg && msgs[msg]) {
    document.addEventListener('DOMContentLoaded', () => showMsg(msgs[msg], 'info'));
  }
})();

function switchTab(tab) {
  const isLogin = tab === 'login';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', isLogin ? i === 0 : i === 1);
  });
  document.getElementById('login-form').style.display = isLogin ? '' : 'none';
  document.getElementById('register-form').style.display = isLogin ? 'none' : '';
  document.getElementById('login-footer').style.display = isLogin ? '' : 'none';
  document.getElementById('register-footer').style.display = isLogin ? 'none' : '';
  clearMsg();
}

function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-student').classList.toggle('selected', role === 'student');
  document.getElementById('role-professor').classList.toggle('selected', role === 'professor');
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type} show`;
}
function clearMsg() {
  document.getElementById('msg').className = 'msg';
}

async function doLogin(e) {
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        login: document.getElementById('login-id').value.trim(),
        password: document.getElementById('login-pw').value
      })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.detail || 'Login failed', 'error'); return; }
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_user', JSON.stringify(data.user));
    showMsg('Signed in! Redirecting...', 'success');
    setTimeout(() => {
      const next = new URLSearchParams(location.search).get('next') || '/';
      location.href = next;
    }, 600);
  } catch(err) {
    showMsg('Connection error. Is the server running?', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function doRegister(e) {
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('register-btn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('reg-email').value.trim(),
        username: document.getElementById('reg-user').value.trim(),
        password: document.getElementById('reg-pw').value,
        role: selectedRole,
        display_name: document.getElementById('reg-name').value.trim()
      })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.detail || 'Registration failed', 'error'); return; }
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_user', JSON.stringify(data.user));
    showMsg('Account created! Redirecting...', 'success');
    setTimeout(() => {
      const next = new URLSearchParams(location.search).get('next') || '/';
      location.href = next;
    }, 600);
  } catch(err) {
    showMsg('Connection error. Is the server running?', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
