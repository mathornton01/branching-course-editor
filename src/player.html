<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Course Player</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --text: #e8eaf0;
      --muted: #7b82a0;
      --accent: #5b7cf6;
      --accent2: #8b5cf6;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1rem; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hud { display: flex; gap: 16px; font-size: 0.8rem; color: var(--muted); flex-shrink: 0; }
    .hud span { display: flex; align-items: center; gap: 4px; }

    /* ── Progress bar ── */
    #progress-bar {
      height: 3px;
      background: var(--border);
      position: sticky;
      top: 53px;
      z-index: 9;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 120px;
    }

    /* ── Node card ── */
    .node-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .node-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 14px;
    }
    .badge-content   { background: #1e3a5f; color: #60a5fa; }
    .badge-example   { background: #2a3a1e; color: #a3e635; }
    .badge-decision  { background: #2d1e5f; color: #a78bfa; }
    .badge-assessment{ background: #1e4a2e; color: #4ade80; }
    .badge-practice  { background: #3a2a1e; color: #fdba74; }
    .badge-random    { background: #3d2a1e; color: #fb923c; }
    .badge-weighted  { background: #3d2a1e; color: #fbbf24; }
    .badge-condition { background: #1e3a3a; color: #22d3ee; }
    .badge-gate      { background: #3d1e1e; color: #f87171; }
    .badge-end       { background: #1e3d1e; color: #4ade80; }

    .node-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    /* ── Markdown content ── */
    .node-content {
      font-size: 1rem;
      line-height: 1.7;
      color: #c8ccd8;
    }
    .node-content h1,.node-content h2,.node-content h3 { color: var(--text); margin: 16px 0 8px; }
    .node-content p { margin-bottom: 12px; }
    .node-content ul,.node-content ol { margin: 8px 0 12px 20px; }
    .node-content code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    .node-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 12px 0; }
    .node-content strong { color: var(--text); }

    /* ── Choices ── */
    .choices { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--text);
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .choice-btn:hover, .choice-btn:focus {
      border-color: var(--accent);
      background: #1d2440;
      outline: none;
    }
    .choice-btn:active { transform: scale(0.98); }
    .choice-btn .choice-letter {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem;
      flex-shrink: 0;
    }
    .choice-btn.selected {
      border-color: var(--accent2);
      background: #1d1840;
    }
    .choice-btn.correct { border-color: var(--success); background: #0f2a1a; }
    .choice-btn.incorrect { border-color: var(--danger); background: #2a0f0f; }

    /* ── Assessment quiz ── */
    .quiz-question {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 14px;
    }
    .quiz-q-text { font-weight: 600; margin-bottom: 12px; }
    .quiz-options { display: flex; flex-direction: column; gap: 7px; }
    .quiz-option {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.9rem;
      display: flex; gap: 8px; align-items: flex-start;
    }
    .quiz-option:hover { border-color: var(--accent); }
    .quiz-option.selected { border-color: var(--accent2); }
    .quiz-option.correct { border-color: var(--success); background: #0f2a1a; }
    .quiz-option.incorrect { border-color: var(--danger); background: #2a0f0f; }
    .quiz-result { margin-top: 14px; padding: 12px; border-radius: 8px; font-weight: 600; text-align: center; }

    /* ── Gate/Condition display ── */
    .info-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .info-box code { color: var(--warn); }

    /* ── Next/action buttons ── */
    .action-row {
      margin-top: 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 13px 24px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      flex: 1;
      min-width: 120px;
      text-align: center;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── History breadcrumbs ── */
    .breadcrumb {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }
    .bc-sep { color: var(--border); }

    /* ── End screen ── */
    .end-screen { text-align: center; padding: 32px 16px; }
    .end-screen .trophy { font-size: 4rem; margin-bottom: 16px; }
    .end-screen h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .end-screen p { color: var(--muted); margin-bottom: 24px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 24px 0; }
    .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    /* ── File drop zone (landing) ── */
    #landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      text-align: center;
      gap: 20px;
    }
    #landing h2 { font-size: 1.5rem; font-weight: 700; }
    #landing p { color: var(--muted); max-width: 360px; }
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 32px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      max-width: 400px;
      width: 100%;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: #1a1e2e; }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .drop-zone label { cursor: pointer; color: var(--accent); }
    #file-input { display: none; }

    /* ── Scrollback history panel ── */
    #history-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 280px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 20;
      overflow-y: auto;
      padding: 16px;
    }
    #history-panel.open { transform: translateX(0); }
    #history-panel h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .hist-item { font-size: 0.8rem; padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid var(--border); color: var(--muted); }
    .hist-item.current { border-color: var(--accent); color: var(--text); background: var(--surface2); }

    /* ── Floating controls ── */
    #fab-area {
      position: fixed;
      bottom: 24px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 15;
    }
    .fab {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.92); }
    .fab-history { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .fab-restart { background: #2a1010; color: var(--danger); border: 1px solid #3d1515; }

    /* ── Responsive ── */
    @media (min-width: 480px) {
      main { padding: 32px 24px 100px; }
      .node-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<!-- LANDING / FILE PICKER -->
<div id="landing">
  <div>
    <div style="font-size:3rem;margin-bottom:12px;">🎓</div>
    <h2>Course Player</h2>
    <p>Browse AI-generated courses or upload your own.</p>
  </div>

  <!-- Catalog Browser -->
  <div id="catalog-section" style="width:100%;max-width:600px;margin:0 auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span style="font-size:0.85rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Course Library</span>
      <button class="btn btn-primary" onclick="loadRandomCourse()" style="font-size:0.8rem;padding:6px 14px;">🎲 Random</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <input id="catalog-search" type="search" placeholder="Search courses..." style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:0.85rem;outline:none;" oninput="filterCatalog()">
      <select id="catalog-theme-filter" onchange="filterCatalog()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:0.85rem;outline:none;">
        <option value="">All themes</option>
        <option value="__none__">No theme</option>
      </select>
      <select id="catalog-filter" onchange="filterCatalog()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:0.85rem;outline:none;">
        <option value="">All levels</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
    </div>
    <div id="catalog-list" style="display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;padding-right:4px;">
      <div style="text-align:center;color:var(--muted);padding:24px;font-size:0.85rem;">Loading courses...</div>
    </div>
    <div id="catalog-status" style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:8px;"></div>
  </div>

  <div style="display:flex;align-items:center;gap:12px;width:100%;max-width:600px;margin:16px auto 0;">
    <div style="flex:1;height:1px;background:var(--border)"></div>
    <span style="font-size:0.75rem;color:var(--muted)">or upload your own</span>
    <div style="flex:1;height:1px;background:var(--border)"></div>
  </div>

  <div class="drop-zone" id="drop-zone">
    <div class="icon">📂</div>
    <div>Drop course JSON here<br>or <label for="file-input">browse to open</label></div>
    <input type="file" id="file-input" accept=".json,.yaml,.yml">
  </div>
  <p style="font-size:0.8rem; color:var(--muted)">Or paste a course URL in the address bar as <code>?url=…</code></p>
</div>

<!-- PLAYER (hidden until course loaded) -->
<div id="player" style="display:none; flex-direction:column; min-height:100dvh;">
  <header>
    <button onclick="showLanding()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px;border-radius:6px;flex-shrink:0;" title="Back to catalog">←</button>
    <div id="hdr-icon" style="font-size:1.2rem">🎓</div>
    <h1 id="hdr-title">Course</h1>
    <div class="hud">
      <span>⭐ <span id="hud-score">0</span></span>
      <span>❓ <span id="hud-node">0</span> answered</span>
    </div>
  </header>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <main id="main-content"></main>
</div>

<!-- History side panel -->
<div id="history-panel">
  <h3>History</h3>
  <div id="hist-list"></div>
</div>
<div id="hist-overlay" onclick="closeHistory()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:19;"></div>

<!-- FABs -->
<div id="fab-area" style="display:none;">
  <button class="fab fab-history" onclick="toggleHistory()" title="History">📋</button>
  <button class="fab fab-restart" onclick="confirmRestart()" title="Restart">🔄</button>
</div>

<script>
// ── Globals ─────────────────────────────────────────────────────────────────
let course = null;
let nodeMap = {};
let connMap = {}; // from node id → [connections]
let state = {
  nodeId: null,
  score: 0,
  history: [],      // [{id, title}]
  vars: {},         // learner variables
  visited: new Set(),
  quizAnswers: {},  // nodeId → {idx, correct}
};

// ── Utilities ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function md(text) {
  if (!text) return '';
  return marked.parse(text, { breaks: true });
}

function getConns(nodeId) {
  return connMap[nodeId] || [];
}

function evalCondition(expr) {
  // Safe-ish eval with vars in scope
  try {
    const vars = state.vars;
    // eslint-disable-next-line no-new-func
    return !!(new Function(...Object.keys(vars), `return !!(${expr})`)(...Object.values(vars)));
  } catch { return false; }
}

// ── Landing ────────────────────────────────────────────────────────────────────
function showLanding() {
  $('player').style.display = 'none';
  $('fab-area').style.display = 'none';
  $('landing').style.display = '';
  fetchCatalog();
}

// ── Course loading ────────────────────────────────────────────────────────────
function loadCourse(data) {
  course = data;

  nodeMap = {};
  connMap = {};

  // Support both formats: {nodes, connections} (editor export) or {nodes} with next fields (sample_course.json)
  const nodes = data.nodes || [];
  const connections = data.connections || [];

  nodes.forEach(n => { nodeMap[n.id] = n; });

  if (connections.length > 0) {
    // Editor/generated format: supports both {from,to} and {source,target}
    connections.forEach(c => {
      const fromKey = c.from || c.source;
      const toKey   = c.to   || c.target;
      if (!fromKey) return;
      if (!connMap[fromKey]) connMap[fromKey] = [];
      connMap[fromKey].push({ ...c, from: fromKey, to: toKey });
    });
  } else {
    // Legacy format: build connections from node.next / node.options
    nodes.forEach(n => {
      connMap[n.id] = [];
      if (n.next) {
        connMap[n.id].push({ from: n.id, to: n.next, type: 'default' });
      }
      if (n.options) {
        n.options.forEach(opt => {
          connMap[n.id].push({ from: n.id, to: opt.next, type: 'default', label: opt.label, score: opt.score });
        });
      }
    });
  }

  // Find start node
  const start = nodes.find(n => n.type === 'start' || n.subtype === 'start') || nodes[0];
  if (!start) { alert('No start node found.'); return; }

  state = { nodeId: start.id, score: 0, history: [], vars: {}, visited: new Set(), quizAnswers: {}, questionsAnswered: 0 };

  // Show player
  $('landing').style.display = 'none';
  const p = $('player');
  p.style.display = 'flex';
  $('fab-area').style.display = 'flex';

  const title = data.course?.title || data.title || 'Course';
  $('hdr-title').textContent = title;
  document.title = title;

  goTo(start.id);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goTo(nodeId) {
  const node = nodeMap[nodeId];
  if (!node) { showError(`Node "${nodeId}" not found.`); return; }

  state.nodeId = nodeId;
  state.visited.add(nodeId);
  state.history.push({ id: nodeId, title: node.title || nodeId });

  updateHUD(node);
  renderHistory();
  renderNode(node);
}

function advance(nodeId) {
  if (!nodeId) return;
  setTimeout(() => goTo(nodeId), 80); // brief delay for animation
}

function updateHUD(node) {
  $('hud-score').textContent = state.score;
  $('hud-node').textContent = state.questionsAnswered || 0;

  // Progress: track questions answered vs estimated total
  const totalQ = course.estimated_questions || Math.max(4, (Object.keys(nodeMap).length - 2) * 0.5);
  const pct = Math.min(99, Math.round(((state.questionsAnswered || 0) / totalQ) * 100));
  $('progress-fill').style.width = pct + '%';
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderNode(node) {
  const el = $('main-content');
  el.innerHTML = '';

  const conns = getConns(node.id);

  switch (node.type) {
    case 'start':
    case 'content':
      el.innerHTML = buildContentCard(node, conns);
      break;
    case 'example':
      el.innerHTML = buildExampleCard(node, conns);
      break;
    case 'decision':
      el.innerHTML = buildDecisionCard(node, conns);
      attachChoiceHandlers(el, node, conns);
      break;
    case 'assessment':
    case 'practice':
      el.innerHTML = buildAssessmentCard(node, conns);
      attachAssessmentHandlers(el, node, conns);
      break;
    case 'random':
      renderRandomNode(node, conns);
      return;
    case 'weighted':
      renderWeightedNode(node, conns);
      return;
    case 'condition':
      renderConditionNode(node, conns);
      return;
    case 'gate':
      el.innerHTML = buildGateCard(node, conns);
      attachGateHandler(el, node, conns);
      break;
    case 'end':
      el.innerHTML = buildEndCard(node);
      break;
    default:
      el.innerHTML = buildContentCard(node, conns);
  }

  // Auto-attach "Continue" for content/start/example nodes
  if (node.type === 'content' || node.type === 'start' || node.type === 'example') {
    const nextBtn = el.querySelector('#next-btn');
    if (nextBtn) {
      nextBtn.addEventListener('click', () => {
        const target = conns.length === 1 ? conns[0].to : null;
        advance(target);
      });
    }
  }
}

// ── Badge ──────────────────────────────────────────────────────────────────────
function badge(node) {
  const map = {
    start:      ['badge-content',    '🚀 Start'],
    content:    ['badge-content',    '📖 Content'],
    example:    ['badge-example',    '💡 Worked Example'],
    decision:   ['badge-decision',   '🔀 Decision'],
    assessment: ['badge-assessment', '📝 Check Understanding'],
    practice:   ['badge-practice',   '🔁 Practice'],
    random:     ['badge-random',     '🎲 Random'],
    weighted:   ['badge-weighted',   '⚖️ Weighted'],
    condition:  ['badge-condition',  '⚡ Condition'],
    gate:       ['badge-gate',       '🚧 Gate'],
    end:        ['badge-end',        '🏁 End'],
  };
  const [cls, label] = map[node.type] || ['badge-content', node.type];
  return `<span class="node-type-badge ${cls}">${label}</span>`;
}

function breadcrumb() {
  const hist = state.history;
  const show = hist.slice(-3);
  const parts = show.map((h, i) =>
    i === show.length - 1
      ? `<span style="color:var(--text)">${h.title}</span>`
      : `<span>${h.title}</span>`
  );
  return `<div class="breadcrumb">${parts.join('<span class="bc-sep">›</span>')}</div>`;
}

// ── Content card ───────────────────────────────────────────────────────────────
function buildContentCard(node, conns) {
  const hasNext = conns.length === 1;
  return `
    <div class="node-card">
      ${breadcrumb()}
      ${badge(node)}
      <div class="node-title">${node.title || ''}</div>
      <div class="node-content">${md(node.content)}</div>
      ${hasNext ? `
      <div class="action-row">
        <button class="btn btn-primary" id="next-btn">Continue →</button>
      </div>` : conns.length === 0 ? '' : `
      <div class="info-box">Multiple connections — handled as decision.</div>`}
    </div>`;
}

// ── Example card ───────────────────────────────────────────────────────────────
function buildExampleCard(node, conns) {
  const hasNext = conns.length === 1;
  return `
    <div class="node-card" style="border-color:#3a4a2a;">
      ${breadcrumb()}
      ${badge(node)}
      <div class="node-title">${node.title || ''}</div>
      <div class="node-content">${md(node.content)}</div>
      ${hasNext ? `
      <div class="action-row">
        <button class="btn btn-primary" id="next-btn" style="background:#4a7c3f;">Got it — continue →</button>
      </div>` : ''}
    </div>`;
}

// ── Decision card ──────────────────────────────────────────────────────────────
function buildDecisionCard(node, conns) {
  // Options come from node.options (legacy) or connections
  const options = node.options && node.options.length > 0
    ? node.options.map((o, i) => ({ label: o.label, to: o.next, score: o.score || 0, idx: i }))
    : conns.map((c, i) => ({ label: c.label || `Option ${i + 1}`, to: c.to, score: c.score || 0, idx: i }));

  const letters = 'ABCDEFGHIJ';
  const choices = options.map((o, i) => `
    <button class="choice-btn" data-to="${o.to}" data-score="${o.score}" data-idx="${i}">
      <span class="choice-letter">${letters[i] || i + 1}</span>
      <span>${o.label}</span>
    </button>`).join('');

  return `
    <div class="node-card">
      ${breadcrumb()}
      ${badge(node)}
      <div class="node-title">${node.title || ''}</div>
      <div class="node-content">${md(node.content)}</div>
      <div class="choices">${choices}</div>
    </div>`;
}

function attachChoiceHandlers(el, node, conns) {
  el.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const to = btn.dataset.to;
      const score = parseInt(btn.dataset.score) || 0;
      state.score += score;
      state.vars['last_choice'] = btn.dataset.idx;
      advance(to);
    });
  });
}

// ── Assessment card ────────────────────────────────────────────────────────────
function buildAssessmentCard(node, conns) {
  const questions = node.questions || [];
  const isPractice = node.type === 'practice';

  const qHtml = questions.map((q, qi) => {
    // Options can be array of strings (new format with separate correct_index)
    // or array of objects {text, correct}
    const rawOpts = q.options || [];
    const correctIdx = (typeof q.correct_index === 'number') ? q.correct_index : -1;
    const feedback = q.feedback || [];

    const opts = rawOpts.map((opt, oi) => {
      const isCorrect = correctIdx >= 0 ? (oi === correctIdx) : (opt.correct === true);
      const optText = typeof opt === 'string' ? opt : (opt.text || opt.label || String(opt));
      const fb = feedback[oi] || '';
      return `
        <div class="quiz-option" data-qi="${qi}" data-oi="${oi}" data-correct="${isCorrect ? '1' : '0'}" data-fb="${encodeURIComponent(fb)}">
          <span style="flex-shrink:0;color:var(--muted)">${'ABCDEFGHIJ'[oi]}.</span>
          <span>${optText}</span>
        </div>`;
    }).join('');

    return `
      <div class="quiz-question" id="q-${qi}">
        <div class="quiz-q-text">${qi + 1}. ${q.text || q.question || ''}</div>
        <div class="quiz-options">${opts}</div>
        <div class="quiz-result" id="qr-${qi}" style="display:none"></div>
        <div class="quiz-explanation" id="qe-${qi}" style="display:none"></div>
      </div>`;
  }).join('');

  const headerNote = isPractice
    ? `<div style="background:#2a200a;border:1px solid #5a3a0a;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:0.85rem;color:#fdba74;">🔁 Let's look at this from a different angle — same concept, fresh perspective.</div>`
    : '';

  return `
    <div class="node-card">
      ${breadcrumb()}
      ${badge(node)}
      <div class="node-title">${node.title || ''}</div>
      ${headerNote}
      <div class="node-content">${md(node.content)}</div>
      ${qHtml}
      <div class="action-row">
        <button class="btn btn-primary" id="submit-quiz-btn" disabled>Submit Answers</button>
      </div>
    </div>`;
}

function attachAssessmentHandlers(el, node, conns) {
  const questions = node.questions || [];
  const answers = {}; // qi → {oi, correct}

  el.querySelectorAll('.quiz-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const qi = parseInt(opt.dataset.qi);
      el.querySelectorAll(`.quiz-option[data-qi="${qi}"]`).forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      answers[qi] = { oi: parseInt(opt.dataset.oi), correct: opt.dataset.correct === '1' };
      if (Object.keys(answers).length === questions.length) {
        el.querySelector('#submit-quiz-btn').disabled = false;
      }
    });
  });

  el.querySelector('#submit-quiz-btn').addEventListener('click', () => {
    let correct = 0;
    questions.forEach((q, qi) => {
      const ans = answers[qi];
      if (!ans) return;
      const isCorrect = ans.correct;
      if (isCorrect) correct++;

      // Mark chosen and show correct
      el.querySelectorAll(`.quiz-option[data-qi="${qi}"]`).forEach(o => {
        const oi = parseInt(o.dataset.oi);
        if (oi === ans.oi) o.classList.add(isCorrect ? 'correct' : 'incorrect');
        if (o.dataset.correct === '1' && !isCorrect) o.classList.add('correct');
      });

      // Show per-choice feedback for the chosen answer
      const chosenOpt = el.querySelector(`.quiz-option[data-qi="${qi}"][data-oi="${ans.oi}"]`);
      const chosenFb = chosenOpt ? decodeURIComponent(chosenOpt.dataset.fb || '') : '';

      const qr = $(`qr-${qi}`);
      if (qr) {
        qr.style.display = '';
        qr.style.background = isCorrect ? '#0f2a1a' : '#2a0f0f';
        qr.style.color = isCorrect ? '#4ade80' : '#f87171';
        qr.textContent = isCorrect ? '✓ Correct' : '✗ Incorrect';
        if (chosenFb) qr.textContent += ' — ' + chosenFb;
      }

      // Show explanation
      const explanation = q.explanation || '';
      const qe = $(`qe-${qi}`);
      if (qe && explanation) {
        qe.style.display = '';
        qe.style.background = '#1a1e30';
        qe.style.border = '1px solid #2e3347';
        qe.style.borderRadius = '8px';
        qe.style.padding = '10px 14px';
        qe.style.fontSize = '0.85rem';
        qe.style.color = '#a0a8c0';
        qe.style.marginTop = '8px';
        qe.innerHTML = `<strong style="color:#7b8ac0">Explanation:</strong> ${explanation}`;
      }
    });

    const pct = questions.length > 0 ? Math.round((correct / questions.length) * 100) : 0;
    const threshold = node.pass_threshold != null ? node.pass_threshold * 100 : (node.passing_score || 70);
    const passed = pct >= threshold;

    state.score += correct;
    state.vars['quiz_score'] = pct;
    state.vars['quiz_passed'] = passed ? 1 : 0;
    state.questionsAnswered = (state.questionsAnswered || 0) + questions.length;

    el.querySelector('#submit-quiz-btn').textContent = `${correct}/${questions.length} correct`;
    el.querySelector('#submit-quiz-btn').disabled = true;

    // Result summary bar
    const summary = document.createElement('div');
    summary.style.cssText = `margin-top:16px;padding:14px;border-radius:10px;text-align:center;font-weight:600;background:${passed?'#0f2a1a':'#1a1018'};border:1px solid ${passed?'#22c55e':'#6b21a8'};color:${passed?'#4ade80':'#c084fc'};`;
    summary.textContent = passed
      ? `✓ Solid understanding — moving forward`
      : `📖 Let's explore this from another angle`;
    el.querySelector('.action-row').before(summary);

    // Determine target — prefer node fields, fall back to connections
    const successConn = conns.find(c => c.label && c.label.toLowerCase().includes('pass')) || conns[0];
    const failConn = conns.find(c => c.label && c.label.toLowerCase().includes('fail')) || conns[1] || conns[0];

    const target = passed
      ? (node.success_target || (successConn && successConn.to))
      : (node.failure_target || (failConn && failConn.to));

    const continueBtn = document.createElement('button');
    continueBtn.className = 'btn btn-primary';
    continueBtn.textContent = 'Continue →';
    continueBtn.style.flex = '1';
    continueBtn.addEventListener('click', () => advance(target));
    el.querySelector('.action-row').appendChild(continueBtn);
  });
}

// ── Random node ────────────────────────────────────────────────────────────────
function renderRandomNode(node, conns) {
  const el = $('main-content');
  if (conns.length === 0) { showError('Random node has no connections.'); return; }

  const pick = conns[Math.floor(Math.random() * conns.length)];

  el.innerHTML = `
    <div class="node-card">
      ${breadcrumb()}
      ${badge(node)}
      <div class="node-title">${node.title || 'Random Branch'}</div>
      <div class="node-content">${md(node.content)}</div>
      <div class="info-box">🎲 Randomly routing through <strong>${conns.length}</strong> paths…</div>
    </div>`;

  setTimeout(() => advance(pick.to), 1200);
}

// ── Weighted node ──────────────────────────────────────────────────────────────
function renderWeightedNode(node, conns) {
  const el = $('main-content');
  if (conns.length === 0) { showError('Weighted node has no connections.'); return; }

  // Normalize weights
  const weights = conns.map(c => Math.max(0, parseFloat(c.weight) || 1));
  const total = weights.reduce((a, b) => a + b, 0) || 1;

  let r = Math.random() * total;
  let pick = conns[conns.length - 1];
  for (let i = 0; i < conns.length; i++) {
    r -= weights[i];
    if (r <= 0) { pick = conns[i]; break; }
  }

  el.innerHTML = `
    <div class="node-card">
      ${breadcrumb()}
      ${badge(node)}
      <div class="node-title">${node.title || 'Weighted Branch'}</div>
      <div class="node-content">${md(node.content)}</div>
      <div class="info-box">⚖️ Routing based on weights…</div>
    </div>`;

  setTimeout(() => advance(pick.to), 1200);
}

// ── Condition node ─────────────────────────────────────────────────────────────
function renderConditionNode(node, conns) {
  // Evaluate each connection's condition; take first true; fall back to default_target
  let target = node.default_target || (conns.length > 0 ? conns[0].to : null);

  for (const c of conns) {
    if (c.condition && evalCondition(c.condition)) {
      target = c.to;
      break;
    }
  }

  const el = $('main-content');
  el.innerHTML = `
    <div class="node-card">
      ${breadcrumb()}
      ${badge(node)}
      <div class="node-title">${node.title || 'Condition'}</div>
      <div class="node-content">${md(node.content)}</div>
      <div class="info-box">⚡ Evaluating condition: <code>${node.condition || '…'}</code></div>
    </div>`;

  setTimeout(() => advance(target), 900);
}

// ── Gate card ──────────────────────────────────────────────────────────────────
function buildGateCard(node, conns) {
  const open = node.condition ? evalCondition(node.condition) : true;
  const target = open ? (node.default_target || (conns[0] && conns[0].to)) : null;

  return `
    <div class="node-card">
      ${breadcrumb()}
      ${badge(node)}
      <div class="node-title">${node.title || 'Gate'}</div>
      <div class="node-content">${md(node.content)}</div>
      <div class="info-box">
        🚧 Gate condition: <code>${node.condition || '…'}</code><br>
        Status: ${open ? '✅ Open — you may pass.' : '🔒 Locked — conditions not met.'}
      </div>
      ${open ? `<div class="action-row"><button class="btn btn-primary" id="gate-btn">Continue →</button></div>` : ''}
    </div>`;
}

function attachGateHandler(el, node, conns) {
  const btn = el.querySelector('#gate-btn');
  if (btn) {
    const target = node.default_target || (conns[0] && conns[0].to);
    btn.addEventListener('click', () => advance(target));
  }
}

// ── End card ───────────────────────────────────────────────────────────────────
function buildEndCard(node) {
  return `
    <div class="node-card end-screen">
      <div class="trophy">🏆</div>
      <h2>${node.title || 'Course Complete!'}</h2>
      <p>${node.content ? node.content.replace(/\n/g, '<br>') : 'You have reached the end of this course.'}</p>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val">${state.questionsAnswered || 0}</div>
          <div class="stat-label">Questions Answered</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${state.score}</div>
          <div class="stat-label">Correct Answers</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${state.visited.size}</div>
          <div class="stat-label">Sections Explored</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${state.questionsAnswered > 0 ? Math.round((state.score / state.questionsAnswered) * 100) : 0}%</div>
          <div class="stat-label">Accuracy</div>
        </div>
      </div>
      <p style="font-size:0.82rem;color:var(--muted);max-width:320px;margin:0 auto;">You worked through your own path to mastery. Every path is equally valid.</p>
      <button class="btn btn-primary" onclick="confirmRestart()" style="max-width:240px;margin:0 auto;">
        🔄 Play Again
      </button>
    </div>`;
}

// ── Error ──────────────────────────────────────────────────────────────────────
function showError(msg) {
  $('main-content').innerHTML = `
    <div class="node-card" style="border-color:var(--danger)">
      <div style="color:var(--danger);font-size:1.2rem;margin-bottom:8px;">⚠️ Error</div>
      <p style="color:var(--muted)">${msg}</p>
    </div>`;
}

// ── History panel ──────────────────────────────────────────────────────────────
function renderHistory() {
  const list = $('hist-list');
  list.innerHTML = state.history.map((h, i) => `
    <div class="hist-item${i === state.history.length - 1 ? ' current' : ''}">
      <div style="font-weight:${i === state.history.length - 1 ? '600' : '400'}">${h.title}</div>
      <div style="font-size:0.72rem;color:var(--border)">${h.id}</div>
    </div>`).join('');
  list.scrollTop = list.scrollHeight;
}

function toggleHistory() {
  $('history-panel').classList.toggle('open');
  $('hist-overlay').style.display = $('history-panel').classList.contains('open') ? 'block' : 'none';
}
function closeHistory() {
  $('history-panel').classList.remove('open');
  $('hist-overlay').style.display = 'none';
}

// ── Restart ────────────────────────────────────────────────────────────────────
function confirmRestart() {
  if (confirm('Restart from the beginning?')) {
    const nodes = course.nodes || [];
    const start = nodes.find(n => n.type === 'start' || n.subtype === 'start') || nodes[0];
    state = { nodeId: start.id, score: 0, history: [], vars: {}, visited: new Set(), quizAnswers: {}, questionsAnswered: 0 };
    goTo(start.id);
  }
}

// ── File loading ───────────────────────────────────────────────────────────────
function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      loadCourse(data);
    } catch (err) { alert('Could not parse file: ' + err.message); }
  };
  reader.readAsText(file);
}

$('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

const dz = $('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
dz.addEventListener('click', () => $('file-input').click());

// ── Course catalog ─────────────────────────────────────────────────────────────
let allCatalogCourses = [];

async function fetchCatalog() {
  try {
    const r = await fetch('/api/courses');
    if (!r.ok) throw new Error('API unavailable');
    const data = await r.json();
    allCatalogCourses = data.courses || [];
    const gen = data.generated || allCatalogCourses.length;
    $('catalog-status').textContent = `${gen} course${gen !== 1 ? 's' : ''} in library · auto-generating more`;
    populateThemeFilter();
    renderCatalog(allCatalogCourses);
  } catch {
    $('catalog-list').innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px;font-size:0.85rem;">No courses yet — generator is running in background</div>';
    $('catalog-status').textContent = 'API not available — try uploading a file';
    // Retry in 10s
    setTimeout(fetchCatalog, 10000);
  }
}

function renderCatalog(courses) {
  const list = $('catalog-list');
  if (!courses.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px;font-size:0.85rem;">No courses match your search</div>';
    return;
  }
  list.innerHTML = courses.map(c => {
    const diff = { beginner: '🟢', intermediate: '🟡', advanced: '🔴' }[c.difficulty] || '⚪';
    const mins = c.estimated_minutes ? `${c.estimated_minutes}m` : '';
    const nodes = c.node_count ? `${c.node_count} nodes` : '';
    return `
    <div class="catalog-card" onclick="playCourse('${c.id}')" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s,transform .1s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:0.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.title}</div>
          <div style="font-size:0.75rem;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.description || c.topic || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;">
          <span style="font-size:0.7rem">${diff} ${c.difficulty || ''}</span>
          <span style="font-size:0.7rem;color:var(--muted)">${[mins, nodes].filter(Boolean).join(' · ')}</span>
        </div>
      </div>
      <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">
        ${c.theme ? `<span style="font-size:0.65rem;background:#3b1f6b;border:1px solid #7c3aed;border-radius:4px;padding:1px 6px;color:#c4b5fd">🎨 ${c.theme}</span>` : ''}
        ${(c.tags||[]).slice(0,3).map(t => `<span style="font-size:0.65rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;color:var(--muted)">${t}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function populateThemeFilter() {
  const sel = $('catalog-theme-filter');
  const themes = [...new Set(allCatalogCourses.map(c => c.theme).filter(Boolean))].sort();
  // keep first two options, replace rest
  while (sel.options.length > 2) sel.remove(2);
  themes.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });
}

function filterCatalog() {
  const q = $('catalog-search').value.toLowerCase();
  const diff = $('catalog-filter').value;
  const theme = $('catalog-theme-filter').value;
  let filtered = allCatalogCourses;
  if (q) filtered = filtered.filter(c => (c.title + c.description + c.topic + (c.theme||'') + (c.tags||[]).join(' ')).toLowerCase().includes(q));
  if (diff) filtered = filtered.filter(c => c.difficulty === diff);
  if (theme === '__none__') filtered = filtered.filter(c => !c.theme);
  else if (theme) filtered = filtered.filter(c => c.theme === theme);
  renderCatalog(filtered);
}

async function playCourse(courseId) {
  try {
    const r = await fetch(`/api/courses/${courseId}`);
    if (!r.ok) throw new Error('Course not found');
    const data = await r.json();
    loadCourse(data);
  } catch (err) {
    alert('Could not load course: ' + err.message);
  }
}

async function loadRandomCourse() {
  try {
    const r = await fetch('/api/random');
    if (!r.ok) throw new Error('No courses available');
    const data = await r.json();
    loadCourse(data);
  } catch (err) {
    alert('No courses available yet — generator is still running.');
  }
}

// Auto-refresh catalog every 30s to show newly generated courses
setInterval(fetchCatalog, 30000);

// ── URL param loading ──────────────────────────────────────────────────────────
(async () => {
  const params = new URLSearchParams(location.search);
  const url = params.get('url');
  const courseId = params.get('course');
  if (courseId) {
    try { await playCourse(courseId); } catch {}
  } else if (url) {
    try {
      const r = await fetch(url);
      const data = await r.json();
      loadCourse(data);
    } catch (err) { /* stay on landing */ }
  }
  // Load catalog on landing
  fetchCatalog();
})();
</script>
