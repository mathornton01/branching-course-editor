id: multi-path-template
name: Multi-Path Scenario
description: Multiple choice scenario with 3+ options leading to different learning paths
category: basic
structure:
  - id: "start"
    type: "content"
    title: "Scenario Introduction"
    content: "You encounter a situation with multiple possible approaches. Choose your path."
    position: {x: 100, y: 100}
  - id: "approach-selection"
    type: "decision"
    title: "Choose Your Approach"
    content: "Which approach would you like to take?"
    options:
      - id: "approach-analytical"
        label: "Analytical Approach"
        description: "Logical, step-by-step analysis"
        condition: "always"
        target: "analytical-path"
      - id: "approach-creative"
        label: "Creative Approach"
        description: "Innovative, outside-the-box thinking"
        condition: "always"
        target: "creative-path"
      - id: "approach-practical"
        label: "Practical Approach"
        description: "Hands-on, real-world application"
        condition: "always"
        target: "practical-path"
      - id: "approach-theoretical"
        label: "Theoretical Approach"
        description: "Conceptual, theory-based understanding"
        condition: "always"
        target: "theoretical-path"
    position: {x: 300, y: 100}
  - id: "analytical-path"
    type: "content"
    title: "Analytical Path"
    content: "You chose the analytical approach. Follow this logical, step-by-step process."
    position: {x: 500, y: 50}
  - id: "creative-path"
    type: "content"
    title: "Creative Path"
    content: "You chose the creative approach. Explore innovative solutions and ideas."
    position: {x: 500, y: 150}
  - id: "practical-path"
    type: "content"
    title: "Practical Path"
    content: "You chose the practical approach. Apply concepts to real-world scenarios."
    position: {x: 500, y: 250}
  - id: "theoretical-path"
    type: "content"
    title: "Theoretical Path"
    content: "You chose the theoretical approach. Study the underlying concepts and principles."
    position: {x: 500, y: 350}
  - id: "convergence-point"
    type: "content"
    title: "Bringing It All Together"
    content: "Regardless of your initial approach, all paths lead to this synthesis point."
    position: {x: 700, y: 200}
  - id: "conclusion"
    type: "content"
    title: "Course Complete"
    content: "You've successfully navigated this multi-path scenario!"
    position: {x: 900, y: 200}
connections:
  - from: "start"
    to: "approach-selection"
    type: "default"
  - from: "approach-selection"
    to: "analytical-path"
    type: "conditional"
    condition: "approach-analytical-selected"
  - from: "approach-selection"
    to: "creative-path"
    type: "conditional"
    condition: "approach-creative-selected"
  - from: "approach-selection"
    to: "practical-path"
    type: "conditional"
    condition: "approach-practical-selected"
  - from: "approach-selection"
    to: "theoretical-path"
    type: "conditional"
    condition: "approach-theoretical-selected"
  - from: "analytical-path"
    to: "convergence-point"
    type: "default"
  - from: "creative-path"
    to: "convergence-point"
    type: "default"
  - from: "practical-path"
    to: "convergence-point"
    type: "default"
  - from: "theoretical-path"
    to: "convergence-point"
    type: "default"
  - from: "convergence-point"
    to: "conclusion"
    type: "default"