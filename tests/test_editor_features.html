<!DOCTYPE html>
<html lang="en">

<!-- ===== MOCK DOM + GLOBALS ================================================= -->
<div id="canvas" style="display:none; width:1200px; height:800px; position:relative;">
  <div id="world"><svg id="connections-svg"></svg><div id="nodes-container"></div></div>
</div>
<div id="props-panel" style="display:none;"></div>
<div id="pages-bar" style="display:none;"><button id="page-add-btn"></button></div>
<div id="status-nodes" style="display:none;"></div>
<div id="status-conns" style="display:none;"></div>
<div id="status-hint" style="display:none;"></div>
<div id="zoom-display" style="display:none;"></div>

<script>
// ===== MINIMAL TEST FRAMEWORK ===============================================
const _categories = [];  // { name, tests: [{ name, fn, result, error, ms }] }
let _currentCat = null;

function describe(name, fn) {
  _currentCat = { name, tests: [] };
  _categories.push(_currentCat);
  fn();
  _currentCat = null;
}

function it(name, fn) {
  _currentCat.tests.push({ name, fn, result: null, error: null, ms: 0 });
}

function assertEqual(actual, expected, msg) {
  if (actual !== expected) throw new Error((msg || 'assertEqual') + `: expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
}
function assertTrue(val, msg) {
  if (!val) throw new Error((msg || 'assertTrue') + ': expected truthy');
}
function assertFalse(val, msg) {
  if (val) throw new Error((msg || 'assertFalse') + ': expected falsy');
}
function assertDeepEqual(a, b, msg) {
  if (JSON.stringify(a) !== JSON.stringify(b)) throw new Error((msg || 'assertDeepEqual') + `: expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
}
function assertGreater(a, b, msg) {
  if (!(a > b)) throw new Error((msg || 'assertGreater') + `: expected ${a} > ${b}`);
}
function assertIncludes(arr, val, msg) {
  if (!arr.includes(val)) throw new Error((msg || 'assertIncludes') + `: ${JSON.stringify(val)} not found`);
}
function assertThrows(fn, msg) {
  let threw = false;
  try { fn(); } catch(e) { threw = true; }
  if (!threw) throw new Error((msg || 'assertThrows') + ': expected function to throw');
}

// ===== EDITOR GLOBALS (mimic the real editor state) =========================
let nodes = [];
let connections = [];
let selectedNodeId = null;
let selectedConnId = null;
let selectedNodeIds = new Set();
let pages = [];
let currentPageIdx = 0;
let viewScale = 1;
let viewPanX = 0;
let viewPanY = 0;
let dragState = null;
let _connPrevSides = {};
let _connJiggleUntil = {};
const JIGGLE_DURATION = 500;
let _pendingNewConnId = null;
let connectState = null;
let courseData = {
  id: 'test-course-1',
  title: 'Test Course',
  description: 'A test course',
  version: '1.0.0',
  tags: ['test'],
  metadata: { author: 'tester', created: '2026-01-01' },
  attributes: [],
  themes: [],
  default_theme_id: 'theme-scholar'
};
let layoutDirection = 'horizontal';
const NODE_WIDTH = 220;
const NODE_CONN_Y = 50;
const SINGLE_OUTPUT_TYPES = new Set(['content', 'gate', 'page_link']);
const ZERO_OUTPUT_TYPES = new Set(['end']);
const TYPE_ICON = { content:'C', decision:'D', assessment:'A', end:'E', random:'R', weighted:'W', condition:'Co', gate:'G', page_link:'PL' };
const EDITOR_SETTINGS_DEFAULTS = {
  showGrid: true, gridSize: '40', nodeShadows: true, animations: true, fontSize: '13',
  sidebarWidth: '288', snapToGrid: false, zoomSpeed: '0.10', zoomMin: '0.10', zoomMax: '5',
  autoFit: true, defaultNodeType: 'content', nodeWidth: '220', showTypeLabels: true,
  showContentPreview: true, showOptionChips: true, connStyle: 'curve', arrowStyle: 'arrow',
  connColor: 'default', connHover: true, confirmDelete: false, confirmClear: false,
  selectOnAdd: false, propsOnSelect: false, layoutDir: 'horizontal',
  exportFormat: 'yaml', prettyJson: true, exportMeta: true,
  apiBaseUrl: 'http://localhost:8001', autoLoad: false, showServerErrors: true,
  nodeRadius: '8', colorScheme: 'default', compactNodes: false,
  showConnLabels: true, edgeThickness: '2', showNodeIds: false,
  highContrast: false, focusRing: false, reduceMotion: false,
  nodeRepulsion: true, linkedDrag: true, downstreamDrag: false,
  autoSave: false, autoSaveInterval: '30', saveIndicator: true,
  renderMarkdown: true, renderLatex: true, renderTables: true, allowImages: true
};
let editorSettings = { ...EDITOR_SETTINGS_DEFAULTS };

// Minimal DOM refs
let canvas, world, svg, nodesContainer, propsPanel;
let zoomDisplay, statusNodes, statusConns, statusHint;

// ===== EDITOR FUNCTIONS (extracted logic, no real DOM manipulation) ==========

// Stubs for functions that touch DOM heavily
function mountNode(node) { /* noop in tests */ }
function renderConnections() { /* noop */ }
function renderAllNodes() { /* noop */ }
function renderProps() { /* noop */ }
function updateStatus() { /* noop */ }
function refreshNodeEl(n) { /* noop */ }
function autoSaveCourse() { /* noop */ }
function setHint(msg) { /* noop */ }
function switchTab(t) { /* noop */ }
function isMobile() { return false; }
function openMobileProps() { /* noop */ }
function fitAll() { /* noop */ }
function renderPagesBar() { /* noop */ }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc(s) { return String(s).replace(/"/g, '&quot;'); }
function refreshAllWeightedPreviews() { /* noop */ }

function addNode(type, pos) {
  const count = nodes.filter(n => n.type === type).length;
  const node = {
    id: type + '-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),
    type,
    title: type.charAt(0).toUpperCase() + type.slice(1) + ' ' + (count + 1),
    content: '',
    position: pos || { x: 80 + Math.random()*180, y: 80 + Math.random()*180 }
  };
  if (type === 'decision')   { node.options = [{ id:'opt-a', label:'Option A' }, { id:'opt-b', label:'Option B' }]; node.attribute_effects = []; }
  if (type === 'assessment') { node.questions = []; node.passing_score = 80; node.success_target = ''; node.failure_target = ''; node.attribute_effects = []; }
  if (type === 'content')    { node.attribute_effects = []; node.attachments = []; }
  if (type === 'end')        { node.attribute_effects = []; }
  if (type === 'random')     { }
  if (type === 'weighted')   { }
  if (type === 'condition')  { node.condition = ''; node.default_target = ''; }
  if (type === 'gate')       { node.condition = ''; node.default_target = ''; }
  if (type === 'page_link')  { node.target_page = ''; node.target_node = ''; }
  nodes.push(node);
  mountNode(node);
  renderConnections();
  updateStatus();
  if (editorSettings.selectOnAdd) selectNode(node.id);
  return node;
}

function deleteNode(nodeId, skipConfirm) {
  if (!skipConfirm && editorSettings.confirmDelete) { return; }
  nodes = nodes.filter(n => n.id !== nodeId);
  connections = connections.filter(c => c.from !== nodeId && c.to !== nodeId);
  if (selectedNodeId === nodeId) { selectedNodeId = null; renderProps(); }
  renderConnections();
  updateStatus();
}

function addConnection(from, to, label) {
  if (from === to) return null;
  if (connections.some(c => c.from === from && c.to === to)) return null;
  const toNode = nodes.find(n => n.id === to);
  if (toNode && toNode.type === 'end') { setHint('End nodes are terminal'); return null; }
  const fromNode = nodes.find(n => n.id === from);
  if (fromNode && SINGLE_OUTPUT_TYPES.has(fromNode.type) && connections.some(c => c.from === from)) {
    setHint('Warning: single output node already has a connection');
  }
  const newConn = { id: 'conn-' + Date.now() + '-' + Math.random().toString(36).slice(2,6), from, to, type: 'default', label: label || '' };
  connections.push(newConn);
  _pendingNewConnId = newConn.id;
  renderConnections();
  updateStatus();
  return newConn;
}

function deleteConnection(id, skipConfirm) {
  if (!skipConfirm && editorSettings.confirmDelete) { return; }
  connections = connections.filter(c => c.id !== id);
  if (selectedConnId === id) { selectedConnId = null; }
  renderConnections();
  renderProps();
  updateStatus();
}

function selectNode(id) {
  selectedNodeId = id; selectedConnId = null;
  renderConnections();
  renderProps();
}

function patchNode(nodeId, field, value) {
  const n = nodes.find(n => n.id === nodeId);
  if (n) { n[field] = value; refreshNodeEl(n); autoSaveCourse(); }
}

function setStartNode(nodeId) {
  nodes.forEach(n => { n.isStart = (n.id === nodeId) || false; });
  updateStatus();
  renderProps();
}

function getNodeIssues(node) {
  const issues = [];
  const outCount = connections.filter(c => c.from === node.id).length;
  if (SINGLE_OUTPUT_TYPES.has(node.type) && outCount > 1) {
    issues.push(`"${node.type}" nodes can only have 1 outgoing connection (has ${outCount})`);
  }
  if (ZERO_OUTPUT_TYPES.has(node.type) && outCount > 0) {
    issues.push('"end" nodes must be terminal');
  }
  return issues;
}

function getAllIssues() {
  const issues = nodes.flatMap(n => getNodeIssues(n).map(msg => ({ nodeId: n.id, title: n.title, msg })));
  if (nodes.length > 0 && !nodes.some(n => n.isStart)) {
    issues.push({ nodeId: null, title: 'Canvas', msg: 'No start node designated' });
  }
  // Detect orphan nodes (no incoming and not start)
  const startNode = nodes.find(n => n.isStart);
  nodes.forEach(n => {
    if (n.isStart) return;
    const hasIncoming = connections.some(c => c.to === n.id);
    if (!hasIncoming && nodes.length > 1) {
      issues.push({ nodeId: n.id, title: n.title, msg: 'Orphan node: no incoming connections' });
    }
  });
  return issues;
}

function getDownstreamNodeIds(startId) {
  const visited = new Set();
  const queue = [startId];
  while (queue.length) {
    const id = queue.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    connections.forEach(c => {
      if (c.from === id && !visited.has(c.to)) queue.push(c.to);
    });
  }
  visited.delete(startId);
  return visited;
}

function getAllConnectedNodeIds(startId) {
  const visited = new Set();
  const queue = [startId];
  while (queue.length) {
    const id = queue.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    connections.forEach(c => {
      if (c.from === id && !visited.has(c.to)) queue.push(c.to);
      if (c.to === id && !visited.has(c.from)) queue.push(c.from);
    });
  }
  visited.delete(startId);
  return visited;
}

function applyNodeRepulsion(nodeList, iterations) {
  if (!editorSettings.nodeRepulsion) return false;
  const nl = nodeList || nodes;
  if (!nl || nl.length < 2) return false;
  const iters = iterations || 5;
  const NODE_W = parseInt(editorSettings.nodeWidth) || 220;
  const NODE_H = 100;
  const PAD_X = 40;
  const PAD_Y = 30;
  const minDistX = NODE_W + PAD_X;
  const minDistY = NODE_H + PAD_Y;
  const STRENGTH = 0.3;
  let anyMoved = false;
  for (let iter = 0; iter < iters; iter++) {
    let moved = false;
    for (let i = 0; i < nl.length; i++) {
      for (let j = i + 1; j < nl.length; j++) {
        const a = nl[i], b = nl[j];
        if (!a.position || !b.position) continue;
        if (dragState && (dragState.nodeId === a.id || dragState.nodeId === b.id)) continue;
        const dx = b.position.x - a.position.x;
        const dy = b.position.y - a.position.y;
        const overlapX = minDistX - Math.abs(dx);
        const overlapY = minDistY - Math.abs(dy);
        if (overlapX > 0 && overlapY > 0) {
          moved = true;
          anyMoved = true;
          if (overlapX < overlapY) {
            const push = Math.max(1, overlapX * STRENGTH);
            const signX = dx >= 0 ? 1 : -1;
            a.position.x -= signX * push;
            b.position.x += signX * push;
          } else {
            const push = Math.max(1, overlapY * STRENGTH);
            const signY = dy >= 0 ? 1 : -1;
            a.position.y -= signY * push;
            b.position.y += signY * push;
          }
        }
      }
    }
    if (!moved) break;
  }
  return anyMoved;
}

function buildNodeExport(n) {
  const o = { id:n.id, type:n.type, title:n.title, content:n.content||'', position:n.position };
  if (n.attribute_effects?.length) o.attribute_effects = n.attribute_effects;
  if (n.type==='decision')   o.options = n.options||[];
  if (n.type==='assessment') { o.questions=n.questions||[]; o.passing_score=n.passing_score||80; }
  if (n.type==='condition' || n.type==='gate') { o.condition = n.condition||''; }
  if (n.type==='page_link') { if(n.target_page) o.target_page = n.target_page; if(n.target_node) o.target_node = n.target_node; }
  return o;
}

function buildConnExport(c, nodeList) {
  const fromNode = nodeList.find(n => n.id === c.from);
  const connType = fromNode?.type === 'condition' ? 'conditional'
                 : fromNode?.type === 'weighted'  ? 'weighted'
                 : fromNode?.type === 'random'    ? 'random'
                 : c.type || 'default';
  const out = { from:c.from, to:c.to, type:connType };
  if (c.label) out.label = c.label;
  if (c.condition) out.condition = c.condition;
  if (c.weight !== undefined && c.weight !== null) out.weight = c.weight;
  return out;
}

function buildExport() {
  if (pages.length > 0) {
    pages[currentPageIdx].nodes = nodes;
    pages[currentPageIdx].connections = connections;
  }
  const courseOut = { ...courseData };
  if (!editorSettings.exportMeta) delete courseOut.metadata;
  if (pages.length > 1) {
    return {
      course: courseOut,
      pages: pages.map(pg => ({
        id: pg.id, title: pg.title,
        nodes: pg.nodes.map(n => buildNodeExport(n)),
        connections: pg.connections.map(c => buildConnExport(c, pg.nodes))
      }))
    };
  } else {
    return {
      course: courseOut,
      nodes: nodes.map(n => buildNodeExport(n)),
      connections: connections.map(c => buildConnExport(c, nodes))
    };
  }
}

function importData(data) {
  if (!data?.nodes && !data?.pages) { throw new Error('Invalid format'); }
  courseData = {
    id: data.course?.id||'course-'+Date.now(),
    title: data.course?.title||'Imported Course',
    description: data.course?.description||'',
    version: data.course?.version||'1.0.0',
    tags: data.course?.tags||[],
    metadata: data.course?.metadata||{},
    attributes: data.course?.attributes||[],
    themes: data.course?.themes||[],
    default_theme_id: data.course?.default_theme_id || 'theme-scholar'
  };
  if (data.pages) {
    pages = data.pages.map(pg => {
      const rawNodes = pg.nodes.map(n => ({ ...n, position: n.position||{x:100,y:100} }));
      const rawConns = (pg.connections||[]).map(c => ({
        id: 'conn-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),
        from:c.from, to:c.to, type:c.type||'default', label:c.label||'', condition:c.condition||'',
        ...(c.weight !== undefined ? { weight: c.weight } : {})
      }));
      return { id: pg.id||'page-'+Date.now(), title: pg.title||'Page', nodes: rawNodes, connections: rawConns };
    });
    currentPageIdx = 0;
    nodes = pages[0].nodes;
    connections = pages[0].connections;
  } else {
    const rawNodes = data.nodes.map(n => ({ ...n, position: n.position||{x:100,y:100} }));
    const rawConns = (data.connections||[]).map(c => ({
      id: 'conn-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),
      from:c.from, to:c.to, type:c.type||'default', label:c.label||'', condition:c.condition||'',
      ...(c.weight !== undefined ? { weight: c.weight } : {})
    }));
    pages = [{ id:'page-1', title:'Page 1', nodes: rawNodes, connections: rawConns }];
    currentPageIdx = 0;
    nodes = rawNodes;
    connections = rawConns;
  }
}

function switchPage(idx) {
  if (idx === currentPageIdx) return;
  pages[currentPageIdx].nodes = nodes;
  pages[currentPageIdx].connections = connections;
  currentPageIdx = idx;
  nodes = pages[idx].nodes;
  connections = pages[idx].connections;
  selectedNodeId = null; selectedConnId = null;
}

function addPage() {
  if (pages.length > 0) {
    pages[currentPageIdx].nodes = nodes;
    pages[currentPageIdx].connections = connections;
  }
  const newPage = { id: 'page-' + Date.now(), title: 'Page ' + (pages.length + 1), nodes: [], connections: [] };
  pages.push(newPage);
  currentPageIdx = pages.length - 1;
  nodes = newPage.nodes;
  connections = newPage.connections;
  selectedNodeId = null; selectedConnId = null;
}

function normalizeWeights(nodeId) {
  const outs = connections.filter(c => c.from === nodeId);
  if (!outs.length) return;
  const total = outs.reduce((s, c) => s + (c.weight || 0), 0);
  if (total === 0) {
    const even = Math.round(100 / outs.length);
    outs.forEach((c, i) => { c.weight = i === outs.length - 1 ? 100 - even * (outs.length - 1) : even; });
  } else {
    outs.forEach(c => { c.weight = Math.round((c.weight || 0) / total * 100 * 10) / 10; });
  }
}

function setSystemTheme(name) { currentSystemTheme = name; darkModeActive = (name === 'dark'); }
function toggleDarkMode() { darkModeActive ? setSystemTheme('default') : setSystemTheme('dark'); }
let currentSystemTheme = 'default';
let darkModeActive = false;

function applyEditorSetting(key, value) { editorSettings[key] = value; }

function insertFlowPattern(name) {
  const cx = 500, cy = 400;
  const GAP = 220;
  function addN(type, dx, dy) {
    return addNode(type, { x: cx + dx, y: cy + dy });
  }
  const conn = (a, b) => addConnection(a.id, b.id);
  if (name === 'content_end') {
    conn(addN('content', -GAP/2, 0), addN('end', GAP/2, 0));
  } else if (name === 'content_decision') {
    const c = addN('content', -GAP, 0), d = addN('decision', 0, 0);
    conn(c, d); conn(d, addN('end', GAP, -70)); conn(d, addN('end', GAP, 70));
  } else if (name === 'branching_story') {
    const c = addN('content', -GAP, 0), d = addN('decision', 0, 0);
    const ca = addN('content', GAP, -GAP/2), cb = addN('content', GAP, GAP/2);
    const e = addN('end', GAP*2, 0);
    conn(c, d); conn(d, ca); conn(d, cb); conn(ca, e); conn(cb, e);
  } else if (name === 'assessment_loop') {
    const intro = addN('content', -GAP, 0), assess = addN('assessment', 0, 0);
    const pass = addN('end', GAP, -80), fail = addN('content', GAP, 80);
    conn(intro, assess); conn(assess, pass); conn(assess, fail); conn(fail, assess);
  } else if (name === 'content_chain') {
    const c1 = addN('content', -GAP, 0), c2 = addN('content', 0, 0), c3 = addN('content', GAP, 0);
    conn(c1, c2); conn(c2, c3); conn(c3, addN('end', GAP*2, 0));
  } else if (name === 'gate_content') {
    conn(addN('gate', -GAP/2, 0), addN('content', GAP/2, 0));
  }
}

// Reset state before each test
function resetState() {
  nodes = [];
  connections = [];
  selectedNodeId = null;
  selectedConnId = null;
  selectedNodeIds = new Set();
  pages = [];
  currentPageIdx = 0;
  viewScale = 1;
  viewPanX = 0;
  viewPanY = 0;
  dragState = null;
  editorSettings = { ...EDITOR_SETTINGS_DEFAULTS, confirmDelete: false, selectOnAdd: false };
  courseData = {
    id: 'test-course-1', title: 'Test Course', description: 'A test course',
    version: '1.0.0', tags: ['test'], metadata: { author: 'tester', created: '2026-01-01' },
    attributes: [], themes: [], default_theme_id: 'theme-scholar'
  };
  darkModeActive = false;
  currentSystemTheme = 'default';
}

// ===== TEST DEFINITIONS =====================================================

// 1. Node CRUD
describe('Node CRUD', () => {
  const allTypes = ['content', 'decision', 'assessment', 'end', 'random', 'weighted', 'condition', 'gate', 'page_link'];

  allTypes.forEach(type => {
    it(`Create ${type} node`, () => {
      resetState();

// 7. Repulsion
describe('Repulsion', () => {
  it('Overlapping nodes get separated', () => {
    resetState();
    editorSettings.nodeRepulsion = true;
    const a = addNode('content', { x: 100, y: 100 });
    const b = addNode('content', { x: 110, y: 105 }); // very close
    const origAx = a.position.x, origBx = b.position.x;
    const moved = applyNodeRepulsion([a, b], 20);
    assertTrue(moved, 'repulsion moved nodes');
    // They should be further apart now
    const dist = Math.abs(b.position.x - a.position.x) + Math.abs(b.position.y - a.position.y);
    const origDist = Math.abs(origBx - origAx) + Math.abs(105 - 100);
    assertGreater(dist, origDist, 'nodes moved apart');
  });

  it('Non-overlapping nodes stay put', () => {
    resetState();
    editorSettings.nodeRepulsion = true;
    const a = addNode('content', { x: 0, y: 0 });
    const b = addNode('content', { x: 800, y: 800 }); // very far
    const moved = applyNodeRepulsion([a, b], 5);
    assertFalse(moved, 'no movement needed');
    assertEqual(a.position.x, 0);
    assertEqual(b.position.x, 800);
  });

  it('Repulsion disabled returns false', () => {
    resetState();
    editorSettings.nodeRepulsion = false;
    const a = addNode('content', { x: 100, y: 100 });
    const b = addNode('content', { x: 110, y: 105 });
    const moved = applyNodeRepulsion([a, b], 20);
    assertFalse(moved);
  });

  it('Single node returns false', () => {
    resetState();
    editorSettings.nodeRepulsion = true;
    const a = addNode('content', { x: 100, y: 100 });
    assertFalse(applyNodeRepulsion([a], 5));
  });
});

describe('Weight Normalization', () => {
  it('Normalize zero weights distributes evenly', () => {
    resetState();
    const w = addNode('weighted', { x: 0, y: 0 });
    const a = addNode('content', { x: 200, y: -50 });
    const b = addNode('content', { x: 200, y: 50 });
    addConnection(w.id, a.id);
    addConnection(w.id, b.id);
    normalizeWeights(w.id);
    const outs = connections.filter(c => c.from === w.id);
    assertEqual(outs.length, 2);
    const totalWeight = outs.reduce((s, c) => s + c.weight, 0);
    assertEqual(totalWeight, 100);
  });

  it('Normalize existing weights scales to 100', () => {
    resetState();
    const w = addNode('weighted', { x: 0, y: 0 });
    const a = addNode('content', { x: 200, y: -50 });
    const b = addNode('content', { x: 200, y: 50 });
    const c1 = addConnection(w.id, a.id);
    const c2 = addConnection(w.id, b.id);
    c1.weight = 30;
    c2.weight = 70;
    normalizeWeights(w.id);
    const outs = connections.filter(c => c.from === w.id);
    const total = outs.reduce((s, c) => s + c.weight, 0);
    assertTrue(Math.abs(total - 100) < 1, 'weights sum to ~100');
  });
});

// ===== TEST RUNNER ===========================================================
async function runTests() {
  const t0 = performance.now();
  let passed = 0, failed = 0, skipped = 0, total = 0;
  const resultsEl = document.getElementById('results');
  const progressFill = document.getElementById('progress-fill');

  // Count total tests
  _categories.forEach(cat => { total += cat.tests.length; });
  document.getElementById('s-total').textContent = total;

  let ran = 0;
  for (const cat of _categories) {
    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    const header = document.createElement('div');
    header.className = 'category-header';
    const body = document.createElement('div');
    body.className = 'category-body';
    catDiv.appendChild(header);
    catDiv.appendChild(body);
    resultsEl.appendChild(catDiv);

    let catPass = 0, catFail = 0;
    for (const test of cat.tests) {
      const t1 = performance.now();
      try {
        test.fn();
        test.result = 'pass';
        passed++;
        catPass++;
      } catch(e) {
        test.result = 'fail';
        test.error = e.message;
        failed++;
        catFail++;
      }
      test.ms = (performance.now() - t1).toFixed(1);
      ran++;
      progressFill.style.width = (ran / total * 100) + '%';

      const row = document.createElement('div');
      row.className = 'test-row';
      row.innerHTML = `
        <span class="badge ${test.result}">${test.result === 'pass' ? '\u2713' : '\u2717'}</span>
        <span class="test-name">${test.name}</span>
        <span class="elapsed">${test.ms}ms</span>
      `;
      body.appendChild(row);
      if (test.error) {
        const errRow = document.createElement('div');
        errRow.className = 'test-error';
        errRow.textContent = test.error;
        body.appendChild(errRow);
      }
    }
    header.textContent = `${cat.name}  (${catPass}/${cat.tests.length} passed)`;
    if (catFail > 0) header.style.background = '#fecaca';
    header.onclick = () => { body.style.display = body.style.display === 'none' ? '' : 'none'; };
  }

  const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
  document.getElementById('s-pass').textContent = passed;
  document.getElementById('s-fail').textContent = failed;
  document.getElementById('s-skip').textContent = skipped;
  document.getElementById('s-time').textContent = elapsed + 's';
  progressFill.style.background = failed > 0 ? '#dc2626' : '#16a34a';

  // Set title for headless test detection
  document.title = failed === 0
    ? `TESTS PASSED (${passed}/${total})`
    : `TESTS FAILED (${failed} failures)`;

  // Expose results globally for headless runners
  window.__TEST_RESULTS = { passed, failed, skipped, total, elapsed };
}
