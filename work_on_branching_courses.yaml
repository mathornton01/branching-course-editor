name: work_on_branching_courses
description: Work on the branching courses project by reading key documents, implementing next steps, and updating documentation
triggers:
  - "work on branching courses project"
  - "continue branching courses"
  - "advance branching courses project"
parameters:
  focus_area:
    type: string
    description: Specific area to work on (api, parser, format, ui, testing, docs)
    default: "next_steps"
steps:
  - read the README.md to understand current project status
  - read the STRATEGY.md to understand overall direction
  - read the TASK_LIST.md to see completed and pending tasks
  - based on current progress, identify the next logical implementation step
  - implement the identified step (typically API endpoints, UI components, or core functionality)
  - test the implementation thoroughly
  - fix any bugs discovered during testing
  - polish the code (formatting, comments, error handling)
  - update README.md with what was accomplished this turn
  - update TASK_LIST.md to mark completed tasks
  - ensure all changes are committed to the project
  - provide a summary of what was accomplished
output: Summary of work completed on the branching courses project